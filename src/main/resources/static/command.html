<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Command Console</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2d3250;
            --text: #e1e4ed;
            --text2: #8b8fa3;
            --accent: #6c5ce7;
            --green: #00b894;
            --yellow: #fdcb6e;
            --red: #e17055;
            --blue: #74b9ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        header .nav-link {
            margin-left: auto;
            color: var(--blue);
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
        }

        header .nav-link+.nav-link {
            margin-left: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            grid-template-rows: auto 1fr;
            gap: 14px;
            padding: 14px;
            height: calc(100vh - 56px);
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-body {
            padding: 14px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 4px;
            font-weight: 500;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
        }

        .btn {
            padding: 7px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #7c6cf7;
        }

        .btn-success {
            background: var(--green);
            color: #fff;
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 5px;
        }

        .agent-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .agent-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .preset-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .preset-section h4 {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .preset-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .preset-btn {
            padding: 4px 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            cursor: pointer;
            font-size: 11px;
        }

        .preset-btn:hover {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.15);
        }

        .result-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .result-card.hidden {
            display: none;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .result-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
        }

        .result-status.pending {
            background: rgba(116, 185, 255, 0.2);
            color: var(--blue);
        }

        .result-status.success {
            background: rgba(0, 184, 148, 0.2);
            color: var(--green);
        }

        .result-status.failed {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .result-status.timeout {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .result-meta {
            font-size: 10px;
            color: var(--text2);
        }

        .result-output {
            background: #0a0c10;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 160px;
            overflow-y: auto;
            color: var(--green);
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        th {
            text-align: left;
            padding: 6px 8px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            position: sticky;
            top: 0;
            background: var(--surface);
        }

        td {
            padding: 5px 8px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(108, 92, 231, 0.05);
        }

        tr.clickable {
            cursor: pointer;
        }

        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        .tag-success {
            background: rgba(0, 184, 148, 0.2);
            color: var(--green);
        }

        .tag-failed {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .tag-pending {
            background: rgba(116, 185, 255, 0.2);
            color: var(--blue);
        }

        .tag-timeout {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .mono {
            font-family: 'Consolas', monospace;
            font-size: 10px;
        }

        .truncate {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .hint {
            font-size: 10px;
            color: var(--text2);
            margin-top: 3px;
        }

        /* WS Monitor */
        .ws-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
        }

        .ws-dot.online {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .ws-status {
            font-size: 11px;
            color: var(--text2);
        }

        .log-console {
            background: #0a0c10;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            line-height: 1.5;
            padding: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .log-entry {
            margin-bottom: 2px;
            word-break: break-all;
        }

        .log-entry .time {
            color: var(--text2);
        }

        .log-entry.up .dir {
            color: var(--green);
        }

        .log-entry.down .dir {
            color: var(--blue);
        }

        .log-entry.sys .dir {
            color: var(--yellow);
        }

        .log-entry.error .dir {
            color: var(--red);
        }
    </style>
</head>

<body>
    <header>
        <h1>🖥️ Remote Command Console</h1>
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
        <a href="debug.html" class="nav-link">← Debug Console</a>
        <a href="logs.html" class="nav-link">Log Hits →</a>
    </header>

    <div class="container">
        <!-- Left: Command Form -->
        <div class="panel" style="grid-row: 1 / 3;">
            <div class="panel-header">📡 发送指令（透传模式）</div>
            <div class="panel-body">
                <div class="form-group">
                    <label>Server Host</label>
                    <input type="text" id="apiHost" value="" placeholder="192.168.x.x:8080">
                </div>

                <div class="form-group">
                    <label>目标 Agent</label>
                    <div class="agent-row">
                        <div class="form-group">
                            <select id="agentId" onchange="onAgentChange()">
                                <option value="">— 请先刷新 —</option>
                            </select>
                        </div>
                        <button class="btn btn-sm btn-success" onclick="loadOnlineAgents()">🔄</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>指令内容 (content — 原样透传到 Agent)</label>
                    <textarea id="content" rows="10">{
  "type": "cmd",
  "cmd": {
    "func": "logTail/add",
    "param": ["D:\\logs\\*.log", ""],
    "cmdID": "add-001"
  }
}</textarea>
                    <div class="hint">⚠️ 必须包含 <b>cmdID</b> 字段，用于关联 Agent 的响应</div>
                </div>

                <button class="btn btn-primary" id="btnSend" onclick="sendCommand()">🚀 发送指令</button>

                <div class="preset-section">
                    <h4>⚡ 快捷模板</h4>
                    <div class="preset-btns" id="presetBtns"></div>
                </div>
            </div>
        </div>

        <!-- Top-Right: Result + History -->
        <div class="panel">
            <div class="panel-header">
                📋 执行结果 & 历史
                <button class="btn btn-sm btn-success" onclick="loadHistory()">刷新</button>
            </div>
            <div class="panel-body" style="display:flex;flex-direction:column;">
                <div class="result-card hidden" id="resultCard">
                    <div class="result-header">
                        <span class="result-status" id="resultStatus">—</span>
                        <span class="result-meta" id="resultMeta"></span>
                    </div>
                    <div class="result-output" id="resultOutput"></div>
                </div>
                <div style="flex:1;overflow-y:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>Agent</th>
                                <th>Func</th>
                                <th>状态</th>
                                <th>响应摘要</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <tr>
                                <td colspan="5">
                                    <div class="empty-state">
                                        <div class="icon">📭</div>
                                        <div>暂无指令记录</div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Bottom-Right: Live WS Monitor -->
        <div class="panel">
            <div class="panel-header">
                📡 实时 Agent 通信 (WebSocket)
                <div class="btn-group">
                    <button class="btn btn-sm btn-danger" onclick="clearWsLog()">清空</button>
                </div>
            </div>
            <div class="ws-bar">
                <div class="ws-dot" id="wsDot"></div>
                <span class="ws-status" id="wsStatus">未连接 — 选择 Agent 后自动订阅</span>
            </div>
            <div class="log-console" id="wsLog"></div>
        </div>
    </div>

    <script>
        const wsLogEl = document.getElementById('wsLog');
        let monitorWs = null;
        let currentMonitorAgent = null;

        function ts() { return new Date().toLocaleTimeString('zh-CN', { hour12: false }) + '.' + String(Date.now() % 1000).padStart(3, '0'); }
        function escapeHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        function getApiBase() { return `http://${document.getElementById('apiHost').value}`; }
        function getWsBase() {
            const host = document.getElementById('apiHost').value;
            return `ws://${host}`;
        }

        // ========== WS Log ==========
        function addWsLog(type, dir, msg) {
            const e = document.createElement('div');
            e.className = 'log-entry ' + type;
            e.innerHTML = `<span class="time">[${ts()}]</span> <span class="dir">[${dir}]</span> ${escapeHtml(msg)}`;
            wsLogEl.appendChild(e);
            wsLogEl.scrollTop = wsLogEl.scrollHeight;
            // 限制条数
            while (wsLogEl.childElementCount > 500) wsLogEl.removeChild(wsLogEl.firstChild);
        }

        function clearWsLog() { wsLogEl.innerHTML = ''; }

        // ========== WS Monitor ==========
        function connectMonitor(agentId) {
            disconnectMonitor();
            if (!agentId) return;

            currentMonitorAgent = agentId;
            const url = `${getWsBase()}/ws/monitor?agentId=${encodeURIComponent(agentId)}`;
            addWsLog('sys', 'SYS', `正在连接 ${url} …`);

            try {
                monitorWs = new WebSocket(url);
            } catch (e) {
                addWsLog('error', 'ERR', `WebSocket 创建失败: ${e.message}`);
                return;
            }

            monitorWs.onopen = function () {
                document.getElementById('wsDot').className = 'ws-dot online';
                document.getElementById('wsStatus').textContent = `已订阅 Agent [${agentId}] 的实时消息`;
                addWsLog('sys', 'SYS', `✅ 已连接并订阅 ${agentId}`);
            };

            monitorWs.onmessage = function (e) {
                try {
                    const msg = JSON.parse(e.data);
                    const dir = msg.dir || 'UNKNOWN';
                    let rawText;
                    if (typeof msg.raw === 'string') {
                        rawText = msg.raw;
                    } else {
                        rawText = JSON.stringify(msg.raw);
                    }

                    if (dir === 'AGENT_UP') {
                        addWsLog('up', '◀ AGENT', rawText);
                    } else if (dir === 'SERVER_DOWN') {
                        addWsLog('down', '▶ SERVER', rawText);
                    } else {
                        addWsLog('sys', dir, rawText);
                    }
                } catch (_) {
                    addWsLog('sys', 'RAW', e.data);
                }
            };

            monitorWs.onerror = function () {
                addWsLog('error', 'ERR', '❌ WebSocket 连接错误');
            };

            monitorWs.onclose = function (e) {
                document.getElementById('wsDot').className = 'ws-dot';
                document.getElementById('wsStatus').textContent = `连接断开 (code=${e.code})`;
                addWsLog('sys', 'SYS', `🔌 连接关闭 code=${e.code}`);
                monitorWs = null;
            };
        }

        function disconnectMonitor() {
            if (monitorWs) {
                monitorWs.close(1000, 'switch-agent');
                monitorWs = null;
            }
            currentMonitorAgent = null;
            document.getElementById('wsDot').className = 'ws-dot';
            document.getElementById('wsStatus').textContent = '未连接';
        }

        function onAgentChange() {
            const agentId = document.getElementById('agentId').value;
            if (agentId && agentId !== currentMonitorAgent) {
                connectMonitor(agentId);
            } else if (!agentId) {
                disconnectMonitor();
            }
        }

        // ========== Online Agents ==========
        async function loadOnlineAgents() {
            try {
                const resp = await fetch(`${getApiBase()}/api/agents/online`);
                const result = await resp.json();
                const agents = result.data || [];
                const sel = document.getElementById('agentId');
                const prevVal = sel.value;
                sel.innerHTML = '';
                if (agents.length === 0) {
                    sel.innerHTML = '<option value="">— 无在线 Agent —</option>';
                } else {
                    agents.forEach(a => {
                        const opt = document.createElement('option');
                        opt.value = a.agentId;
                        opt.textContent = `${a.agentId} (${a.open ? '在线' : '离线'})`;
                        sel.appendChild(opt);
                    });
                    // 恢复之前选中的
                    if (prevVal) sel.value = prevVal;
                }
                onAgentChange();
            } catch (e) {
                addWsLog('error', 'API', `获取 Agent 列表失败: ${e.message}`);
            }
        }

        // ========== Send Command ==========
        async function sendCommand() {
            const agentId = document.getElementById('agentId').value;
            const content = document.getElementById('content').value.trim();
            if (!agentId) { alert('请选择目标 Agent'); return; }
            if (!content) { alert('请输入指令内容'); return; }
            try { JSON.parse(content); } catch (e) { alert('content 必须是合法的 JSON: ' + e.message); return; }

            const btn = document.getElementById('btnSend');
            const orig = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 等待…';
            showResult('PENDING', `Agent: ${agentId}`, '等待 Agent 执行…');

            try {
                const resp = await fetch(`${getApiBase()}/api/commands/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agentId, content })
                });
                const result = await resp.json();
                const r = result.data;
                if (result.code === 200 && r) {
                    showResult(r.status,
                        `Agent: ${r.agentId} | Func: ${r.action || '—'} | cmdId: ${r.cmdId}`,
                        r.response || '(无输出)');
                } else {
                    showResult('FAILED', '', result.message || '请求失败');
                }
            } catch (e) {
                showResult('FAILED', '', '请求异常: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = orig;
                loadHistory();
            }
        }

        function showResult(status, meta, output) {
            const card = document.getElementById('resultCard');
            card.classList.remove('hidden');
            const statusEl = document.getElementById('resultStatus');
            const labels = { PENDING: '⏳ PENDING', SUCCESS: '✅ SUCCESS', FAILED: '❌ FAILED', TIMEOUT: '⏰ TIMEOUT' };
            statusEl.textContent = labels[status] || status;
            statusEl.className = 'result-status ' + status.toLowerCase();
            document.getElementById('resultMeta').textContent = meta;
            const outputEl = document.getElementById('resultOutput');
            try { outputEl.textContent = JSON.stringify(JSON.parse(output), null, 2); }
            catch (_) { outputEl.textContent = output; }
            outputEl.style.color = status === 'SUCCESS' ? 'var(--green)' : status === 'FAILED' ? 'var(--red)' : status === 'TIMEOUT' ? 'var(--yellow)' : 'var(--blue)';
        }

        // ========== Presets ==========
        const PRESETS = [
            { label: '📂 监听日志', content: { type: 'cmd', cmd: { func: 'logTail/add', param: ['D:\\logs\\*.log', ''], cmdID: 'add-001' } } },
            { label: '🛑 停止监听', content: { type: 'cmd', cmd: { func: 'logTail/remove', param: ['D:\\logs\\*.log'], cmdID: 'remove-001' } } },
            { label: '💳 读身份证', content: { type: 'cmd', cmd: { func: 'iDCardReader/read', param: [], cmdID: 'read-001' } } },
            { label: '📊 获取指标', content: { type: 'cmd', cmd: { func: 'metrics/get', param: [], cmdID: 'metrics-001' } } },
        ];

        function initPresets() {
            const c = document.getElementById('presetBtns');
            PRESETS.forEach(p => {
                const b = document.createElement('button');
                b.className = 'preset-btn';
                b.textContent = p.label;
                b.addEventListener('click', () => { document.getElementById('content').value = JSON.stringify(p.content, null, 2); });
                c.appendChild(b);
            });
        }

        // ========== History ==========
        async function loadHistory() {
            try {
                const resp = await fetch(`${getApiBase()}/api/commands`);
                const records = (await resp.json()).data || [];
                const tbody = document.getElementById('historyTable');
                if (records.length === 0) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">📭</div><div>暂无</div></div></td></tr>'; return; }
                tbody.innerHTML = records.map(r => {
                    const sc = r.status === 'SUCCESS' ? 'tag-success' : r.status === 'FAILED' ? 'tag-failed' : r.status === 'TIMEOUT' ? 'tag-timeout' : 'tag-pending';
                    const t = r.createTime ? new Date(r.createTime).toLocaleString('zh-CN', { hour12: false }) : '—';
                    const sn = (r.response || '').substring(0, 50) + ((r.response || '').length > 50 ? '…' : '');
                    return `<tr class="clickable" onclick="viewDetail('${r.cmdId}')"><td class="mono">${t}</td><td>${escapeHtml(r.agentId || '')}</td><td class="mono">${escapeHtml(r.action || '—')}</td><td><span class="tag ${sc}">${r.status}</span></td><td class="truncate">${escapeHtml(sn)}</td></tr>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        async function viewDetail(cmdId) {
            try {
                const r = (await (await fetch(`${getApiBase()}/api/commands/${cmdId}`)).json()).data;
                if (r) showResult(r.status, `Agent: ${r.agentId} | Func: ${r.action || '—'} | cmdId: ${r.cmdId}`, r.response || '(无输出)');
            } catch (e) { console.error(e); }
        }

        // ========== Init ==========
        (function () {
            const h = document.getElementById('apiHost');
            h.value = location.protocol === 'file:' ? 'localhost:8080' : (location.host || 'localhost:8080');
            initPresets();
            loadOnlineAgents();
            loadHistory();
        })();
    </script>
</body>

</html>
