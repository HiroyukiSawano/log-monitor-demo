<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Hits — 命中日志查看</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2d3250;
            --text: #e1e4ed;
            --text2: #8b8fa3;
            --accent: #6c5ce7;
            --green: #00b894;
            --yellow: #fdcb6e;
            --red: #e17055;
            --blue: #74b9ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .nav-links {
            margin-left: auto;
            display: flex;
            gap: 16px;
        }

        .nav-links a {
            color: var(--blue);
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
            height: calc(100vh - 60px);
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 0;
        }

        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 24px;
            flex: 1;
            text-align: center;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card.critical .value {
            color: var(--red);
        }

        .stat-card.error .value {
            color: var(--yellow);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filters label {
            font-size: 12px;
            color: var(--text2);
        }

        input,
        select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #7c6cf7;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 11px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            text-align: left;
            padding: 8px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            position: sticky;
            top: 0;
            background: var(--surface);
        }

        td {
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(108, 92, 231, 0.05);
        }

        tr.clickable {
            cursor: pointer;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .tag-critical {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .tag-error {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .mono {
            font-family: 'Consolas', monospace;
            font-size: 11px;
        }

        .truncate {
            max-width: 350px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Detail Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal h3 {
            margin-bottom: 16px;
            font-size: 16px;
        }

        .modal .field {
            margin-bottom: 12px;
        }

        .modal .field-label {
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal .field-value {
            font-size: 13px;
        }

        .modal .log-box {
            background: #0a0c10;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 250px;
            overflow-y: auto;
            color: var(--red);
        }

        .modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: var(--text2);
            font-size: 20px;
            cursor: pointer;
        }

        .modal .close-btn:hover {
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <header>
        <h1>📊 命中日志查看</h1>
        <div class="nav-links">
            <a href="dashboard.html">📊 Dashboard</a>
            <a href="debug.html">← Debug Console</a>
            <a href="command.html">Remote Command</a>
        </div>
    </header>

    <div class="container">
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card critical">
                <div class="value" id="statCritical">—</div>
                <div class="label">🔴 CRITICAL 强关注</div>
            </div>
            <div class="stat-card error">
                <div class="value" id="statError">—</div>
                <div class="label">🟡 UNKNOWN_ERROR 未知错误</div>
            </div>
        </div>

        <!-- Filter & Table -->
        <div class="panel" style="flex:1;">
            <div class="panel-header">
                📋 命中记录
                <div class="btn-group">
                    <button class="btn btn-primary btn-sm" onclick="loadRecords()">🔄 刷新</button>
                </div>
            </div>
            <div class="panel-body" style="padding:0 16px 16px 16px;">
                <!-- Filters -->
                <div class="filters" style="padding:12px 0;">
                    <label>Host</label>
                    <input type="text" id="apiHost" value="" placeholder="localhost:8080" style="width:150px;">
                    <label>Agent</label>
                    <input type="text" id="filterAgent" value="" placeholder="全部" style="width:130px;">
                    <label>级别</label>
                    <select id="filterLevel" style="width:140px;">
                        <option value="">全部</option>
                        <option value="CRITICAL">CRITICAL</option>
                        <option value="UNKNOWN_ERROR">UNKNOWN_ERROR</option>
                    </select>
                    <label>数量</label>
                    <select id="filterLimit" style="width:80px;">
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="200">200</option>
                        <option value="500">500</option>
                    </select>
                    <button class="btn btn-primary btn-sm" onclick="loadRecords()">查询</button>
                </div>

                <!-- Table -->
                <div style="flex:1;overflow-y:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>Agent</th>
                                <th>应用</th>
                                <th>级别</th>
                                <th>命中规则</th>
                                <th>日志摘要</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTable">
                            <tr>
                                <td colspan="6">
                                    <div class="empty-state">
                                        <div class="icon">📭</div>
                                        <div>暂无命中记录，请先发送日志测试</div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="hideModal()">✕</button>
            <h3>📄 日志命中详情</h3>
            <div class="field">
                <div class="field-label">Agent / 应用</div>
                <div class="field-value" id="detailAgent"></div>
            </div>
            <div class="field">
                <div class="field-label">级别 / 命中规则</div>
                <div class="field-value" id="detailRule"></div>
            </div>
            <div class="field">
                <div class="field-label">日志路径</div>
                <div class="field-value mono" id="detailPath"></div>
            </div>
            <div class="field">
                <div class="field-label">上报时间</div>
                <div class="field-value mono" id="detailTime"></div>
            </div>
            <div class="field">
                <div class="field-label">原始日志内容</div>
                <div class="log-box" id="detailLog"></div>
            </div>
        </div>
    </div>

    <script>
        function getApiBase() { return `http://${document.getElementById('apiHost').value}`; }

        function escapeHtml(s) {
            return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ========== Stats ==========
        async function loadStats() {
            try {
                const resp = await fetch(`${getApiBase()}/api/loghits/stats`);
                const result = await resp.json();
                const stats = result.data || {};
                document.getElementById('statCritical').textContent = stats.CRITICAL || 0;
                document.getElementById('statError').textContent = stats.UNKNOWN_ERROR || 0;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        // ========== Records ==========
        async function loadRecords() {
            const agentId = document.getElementById('filterAgent').value.trim();
            const level = document.getElementById('filterLevel').value;
            const limit = document.getElementById('filterLimit').value;

            const params = new URLSearchParams();
            if (agentId) params.set('agentId', agentId);
            if (level) params.set('level', level);
            params.set('limit', limit);

            try {
                const resp = await fetch(`${getApiBase()}/api/loghits?${params}`);
                const result = await resp.json();
                const records = result.data || [];
                const tbody = document.getElementById('recordsTable');

                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📭</div><div>无匹配记录</div></div></td></tr>';
                    loadStats();
                    return;
                }

                tbody.innerHTML = records.map(r => {
                    const levelClass = r.level === 'CRITICAL' ? 'tag-critical' : 'tag-error';
                    const time = r.logTime ? new Date(r.logTime).toLocaleString('zh-CN', { hour12: false }) : '—';
                    const snippet = (r.logContent || '').substring(0, 80) + ((r.logContent || '').length > 80 ? '…' : '');
                    return `<tr class="clickable" onclick="viewDetail(${r.id})">
                        <td class="mono">${time}</td>
                        <td>${escapeHtml(r.agentId)}</td>
                        <td>${escapeHtml(r.appName || '')}</td>
                        <td><span class="tag ${levelClass}">${r.level}</span></td>
                        <td>${escapeHtml(r.matchedRuleName || '')} <span class="mono" style="color:var(--text2)">${escapeHtml(r.matchedKeyword || '')}</span></td>
                        <td class="truncate mono" title="${escapeHtml(r.logContent || '')}">${escapeHtml(snippet)}</td>
                    </tr>`;
                }).join('');

                loadStats();
            } catch (e) {
                console.error('加载记录失败:', e);
            }
        }

        // ========== Detail Modal ==========
        async function viewDetail(id) {
            try {
                const resp = await fetch(`${getApiBase()}/api/loghits/${id}`);
                const result = await resp.json();
                const r = result.data;
                if (!r) return;

                document.getElementById('detailAgent').textContent = `${r.agentId || ''} / ${r.appName || ''}`;
                document.getElementById('detailRule').innerHTML = `<span class="tag ${r.level === 'CRITICAL' ? 'tag-critical' : 'tag-error'}">${r.level}</span> ${escapeHtml(r.matchedRuleName || '')} — <span class="mono">${escapeHtml(r.matchedKeyword || '')}</span>`;
                document.getElementById('detailPath').textContent = r.logPath || '—';
                document.getElementById('detailTime').textContent = r.logTime ? new Date(r.logTime).toLocaleString('zh-CN', { hour12: false }) : '—';
                document.getElementById('detailLog').textContent = r.logContent || '(无内容)';
                document.getElementById('detailLog').style.color = r.level === 'CRITICAL' ? 'var(--red)' : 'var(--yellow)';

                document.getElementById('modalOverlay').classList.add('active');
            } catch (e) {
                console.error('查询详情失败:', e);
            }
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modalOverlay')) hideModal();
        }

        function hideModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // ========== Init ==========
        (function () {
            const hostInput = document.getElementById('apiHost');
            if (location.protocol === 'file:') {
                hostInput.value = 'localhost:8080';
            } else {
                hostInput.value = location.host || 'localhost:8080';
            }
            loadStats();
            loadRecords();
        })();
    </script>
</body>

</html>
