<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2d3250;
            --text: #e1e4ed;
            --text2: #8b8fa3;
            --accent: #6c5ce7;
            --green: #00b894;
            --yellow: #fdcb6e;
            --red: #e17055;
            --blue: #74b9ff;
            --cyan: #81ecec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ========== Header ========== */
        header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        header .nav-link {
            margin-left: auto;
            color: var(--blue);
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
        }

        header .nav-link+.nav-link {
            margin-left: 0;
        }

        header .nav-link:hover {
            opacity: 1;
        }

        /* ========== Toolbar ========== */
        .toolbar {
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .toolbar label {
            font-size: 12px;
            color: var(--text2);
        }

        .toolbar input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            width: 200px;
        }

        .toolbar input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toolbar .refresh-info {
            margin-left: auto;
            font-size: 11px;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar .countdown {
            color: var(--cyan);
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* ========== Stats Bar ========== */
        .stats-bar {
            display: flex;
            gap: 14px;
            padding: 12px 24px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            font-size: 24px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text2);
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        /* ========== Main Layout ========== */
        .main {
            display: flex;
            height: calc(100vh - 156px);
        }

        /* ========== Agent Cards Grid ========== */
        .cards-section {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 14px;
        }

        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            position: relative;
        }

        .agent-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
            transform: translateY(-2px);
        }

        .agent-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.3);
        }

        .agent-card.offline {
            opacity: 0.65;
        }

        .card-header {
            padding: 12px 14px 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }

        .online-dot.on {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                box-shadow: 0 0 4px var(--green);
            }

            50% {
                box-shadow: 0 0 12px var(--green);
            }
        }

        .online-dot.off {
            background: var(--red);
        }

        .card-hostname {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-alert {
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .card-os {
            padding: 0 14px;
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .card-metrics {
            padding: 0 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .metric-label {
            width: 36px;
            color: var(--text2);
            font-weight: 600;
            flex-shrink: 0;
        }

        .metric-bar {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .metric-val {
            width: 38px;
            text-align: right;
            font-weight: 600;
            font-size: 10px;
        }

        .card-footer {
            padding: 6px 14px;
            font-size: 10px;
            color: var(--text2);
            border-top: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-footer .agent-id {
            font-family: 'Consolas', monospace;
            font-size: 9px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== Detail Side Panel ========== */
        .detail-panel {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            border-left: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
        }

        .detail-panel.open {
            width: 480px;
        }

        .detail-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-header h2 {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-close:hover {
            background: var(--bg);
            color: var(--text);
        }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
        }

        .detail-section {
            margin-bottom: 16px;
        }

        .detail-section h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Hardware Info Table */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .info-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .info-item .label {
            font-size: 10px;
            color: var(--text2);
            margin-bottom: 2px;
        }

        .info-item .value {
            font-size: 12px;
            font-weight: 600;
        }

        .info-item.wide {
            grid-column: 1 / -1;
        }

        /* Process List */
        .process-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .process-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .process-row:hover {
            border-color: var(--accent);
        }

        .process-name {
            flex: 1;
            font-size: 12px;
            font-weight: 500;
        }

        .process-status {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .process-status.ok {
            background: rgba(0, 184, 148, 0.15);
            color: var(--green);
        }

        .process-status.error {
            background: rgba(225, 112, 85, 0.15);
            color: var(--red);
        }

        /* Disk Partitions */
        .disk-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .disk-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .disk-mount {
            font-size: 13px;
            font-weight: 700;
            width: 28px;
            color: var(--cyan);
        }

        .disk-bar-wrap {
            flex: 1;
        }

        .disk-bar {
            height: 8px;
            background: var(--surface2);
            border-radius: 4px;
            overflow: hidden;
        }

        .disk-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .disk-meta {
            font-size: 10px;
            color: var(--text2);
            white-space: nowrap;
        }

        /* Log Timeline */
        .log-timeline {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-row {
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
        }

        .log-row .log-time {
            font-size: 10px;
            color: var(--text2);
            margin-bottom: 2px;
        }

        .log-row .log-level {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            margin-right: 4px;
        }

        .log-level.CRITICAL {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .log-level.UNKNOWN_ERROR {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .log-row .log-content {
            font-family: 'Consolas', monospace;
            font-size: 10px;
            color: var(--text);
            word-break: break-all;
            max-height: 60px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        /* ========== Alert Banner ========== */
        .alert-banner {
            display: none;
            background: linear-gradient(90deg, rgba(225, 112, 85, 0.12) 0%, rgba(253, 203, 110, 0.08) 100%);
            border-bottom: 1px solid rgba(225, 112, 85, 0.3);
            padding: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .alert-banner.show {
            display: block;
        }

        .alert-banner-header {
            display: flex;
            align-items: center;
            padding: 6px 24px;
            gap: 8px;
            position: sticky;
            top: 0;
            background: rgba(15, 17, 23, 0.9);
            z-index: 2;
        }

        .alert-banner-header .title {
            font-size: 12px;
            font-weight: 600;
            color: var(--red);
            flex: 1;
        }

        .alert-banner-header .btn-ack-all {
            font-size: 10px;
            padding: 2px 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            border-radius: 4px;
            cursor: pointer;
        }

        .alert-banner-header .btn-ack-all:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 24px;
            font-size: 11px;
            border-top: 1px solid rgba(45, 50, 80, 0.3);
        }

        .alert-item .alert-level-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 3px;
        }

        .alert-level-tag.CRITICAL {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .alert-level-tag.WARNING {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .alert-item .alert-msg {
            flex: 1;
            color: var(--text);
        }

        .alert-item .alert-time {
            color: var(--text2);
            font-size: 10px;
        }

        .alert-item .btn-ack {
            font-size: 10px;
            padding: 1px 8px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text2);
            border-radius: 3px;
            cursor: pointer;
        }

        .alert-item .btn-ack:hover {
            border-color: var(--green);
            color: var(--green);
        }

        /* ========== Rule Config Modal ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 560px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h2 {
            font-size: 15px;
            flex: 1;
        }

        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            font-size: 12px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-primary {
            padding: 6px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            padding: 6px 18px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: var(--text2);
        }

        .rule-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
        }

        .rule-item .rule-info {
            flex: 1;
        }

        .rule-item .rule-name {
            font-weight: 600;
            color: var(--text);
        }

        .rule-item .rule-desc {
            color: var(--text2);
            font-size: 10px;
            margin-top: 2px;
        }

        .rule-item .btn-del {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            opacity: 0.7;
        }

        .rule-item .btn-del:hover {
            opacity: 1;
        }

        .btn-add-rule {
            width: 100%;
            padding: 8px;
            background: var(--surface2);
            border: 1px dashed var(--border);
            color: var(--text2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 6px;
        }

        .btn-add-rule:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .add-rule-form {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        /* Scrollbar style */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text2);
        }
    </style>
</head>

<body>
    <header>
        <h1>📊 Monitoring Dashboard</h1>
        <a href="debug.html" class="nav-link">Debug Console</a>
        <a href="command.html" class="nav-link">Remote Command</a>
        <a href="logs.html" class="nav-link">Log Hits</a>
    </header>

    <div class="toolbar">
        <label>Server Host</label>
        <input type="text" id="apiHost" placeholder="localhost:8080">
        <div class="refresh-info">
            自动刷新 <span class="countdown" id="countdown">15</span>s
            <span id="lastRefreshTime">—</span>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-icon">🖥️</span>
            <div>
                <div class="stat-label">总服务器</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🟢</span>
            <div>
                <div class="stat-label">在线</div>
                <div class="stat-value" id="statOnline" style="color:var(--green)">0</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🔴</span>
            <div>
                <div class="stat-label">离线</div>
                <div class="stat-value" id="statOffline" style="color:var(--red)">0</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-icon">⚠️</span>
            <div>
                <div class="stat-label">进程异常</div>
                <div class="stat-value" id="statAlerts" style="color:var(--yellow)">0</div>
            </div>
        </div>
    </div>

    <!-- Alert Notification Banner -->
    <div class="alert-banner" id="alertBanner">
        <div class="alert-banner-header">
            <span class="title">🔔 未确认告警 (<span id="alertCount">0</span>)</span>
            <button class="btn-ack-all" onclick="ackAllAlerts()">全部确认</button>
        </div>
        <div id="alertList"></div>
    </div>

    <div class="main">
        <div class="cards-section" id="cardsSection">
            <div class="cards-grid" id="cardsGrid">
                <div class="empty-state">
                    <div class="icon">📡</div>
                    <div>正在加载服务器数据…</div>
                </div>
            </div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <h2 id="detailTitle">服务器详情</h2>
                <button class="btn-close" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <script>
        // ========== Config ==========
        let refreshInterval = 15;
        let countdownVal = refreshInterval;
        let countdownTimer = null;
        let selectedAgentId = null;

        function getApiBase() { return `http://${document.getElementById('apiHost').value}`; }
        function escapeHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

        // ========== Color Helpers ==========
        function usageColor(pct) {
            if (pct >= 80) return 'var(--red)';
            if (pct >= 50) return 'var(--yellow)';
            return 'var(--green)';
        }

        function parsePct(str) {
            if (!str) return 0;
            return parseFloat(str.replace('%', '')) || 0;
        }

        function parseMB(str) {
            if (!str) return 0;
            let v = parseFloat(str);
            return isNaN(v) ? 0 : v;
        }

        function formatSize(mb) {
            if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
            return mb + ' MB';
        }

        // ========== Load Data ==========
        async function loadDashboard() {
            try {
                const resp = await fetch(`${getApiBase()}/api/dashboard/agents`);
                const result = await resp.json();
                if (result.code !== 200) { console.error(result.message); return; }
                const agents = result.data || [];
                renderCards(agents);
                updateStats(agents);

                // Refresh detail panel if one is selected
                if (selectedAgentId) {
                    loadDetail(selectedAgentId);
                }

                document.getElementById('lastRefreshTime').textContent =
                    new Date().toLocaleTimeString('zh-CN', { hour12: false });
            } catch (e) {
                console.error('加载失败:', e);
            }
        }

        function updateStats(agents) {
            const total = agents.length;
            const online = agents.filter(a => a.online).length;
            const offline = total - online;
            let alerts = 0;
            agents.forEach(a => {
                if (a.processStatusList) {
                    a.processStatusList.forEach(p => {
                        if (p.status !== '正常') alerts++;
                    });
                }
            });
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statOnline').textContent = online;
            document.getElementById('statOffline').textContent = offline;
            document.getElementById('statAlerts').textContent = alerts;
        }

        // ========== Render Cards ==========
        function renderCards(agents) {
            const grid = document.getElementById('cardsGrid');
            if (agents.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📡</div><div>暂无服务器数据</div><div style="font-size:11px;margin-top:4px;color:var(--text2)">等待 Agent 上报 METRICS…</div></div>`;
                return;
            }

            grid.innerHTML = agents.map(a => {
                const isOnline = a.online;
                const hostname = a.mainframeName || '未知主机';
                const osInfo = [a.osName, a.osVersion].filter(Boolean).join(' ') || '—';
                const cpuPct = parsePct(a.cpuUsage);
                const totalDisk = parseMB(a.totalDiskCapacity);
                const availDisk = parseMB(a.totalAvailableCapacityDisk);
                const diskPct = totalDisk > 0 ? Math.round(((totalDisk - availDisk) / totalDisk) * 100) : 0;

                // Parse RAM usage
                let ramPct = 0;
                if (a.ramCapacity && a.ramUsage) {
                    const ramTotal = parseFloat(a.ramCapacity);
                    const ramUsed = parseFloat(a.ramUsage);
                    if (ramTotal > 0) ramPct = Math.round((ramUsed / ramTotal) * 100);
                }

                // Count process alerts
                let alertCount = 0;
                if (a.processStatusList) {
                    a.processStatusList.forEach(p => { if (p.status !== '正常') alertCount++; });
                }

                const active = selectedAgentId === a.agentId ? ' active' : '';
                const offlineClass = isOnline ? '' : ' offline';

                return `
                <div class="agent-card${active}${offlineClass}" onclick="selectAgent('${escapeHtml(a.agentId)}')">
                    ${alertCount > 0 ? `<div class="badge-alert" style="position:absolute;top:10px;right:10px;">${alertCount}</div>` : ''}
                    <div class="card-header">
                        <div class="online-dot ${isOnline ? 'on' : 'off'}"></div>
                        <div class="card-hostname">${escapeHtml(hostname)}</div>
                    </div>
                    <div class="card-os">${escapeHtml(osInfo)}</div>
                    <div class="card-metrics">
                        ${metricBar('CPU', cpuPct)}
                        ${metricBar('RAM', ramPct)}
                        ${metricBar('Disk', diskPct)}
                    </div>
                    <div class="card-footer">
                        <span>${isOnline ? '🟢 在线' : '🔴 离线'}</span>
                        <span style="flex:1"></span>
                        <span class="agent-id" title="${escapeHtml(a.agentId)}">${escapeHtml(a.agentId ? a.agentId.substring(0, 12) + '…' : '')}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function metricBar(label, pct) {
            const color = usageColor(pct);
            return `
            <div class="metric-row">
                <span class="metric-label">${label}</span>
                <div class="metric-bar"><div class="metric-fill" style="width:${pct}%;background:${color}"></div></div>
                <span class="metric-val" style="color:${color}">${pct}%</span>
            </div>`;
        }

        // ========== Detail Panel ==========
        function selectAgent(agentId) {
            selectedAgentId = agentId;
            document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
            // Find and highlight the card
            document.querySelectorAll('.agent-card').forEach(c => {
                if (c.onclick.toString().includes(agentId)) c.classList.add('active');
            });
            loadDetail(agentId);
            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetail() {
            selectedAgentId = null;
            document.getElementById('detailPanel').classList.remove('open');
            document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
        }

        async function loadDetail(agentId) {
            const body = document.getElementById('detailBody');
            body.innerHTML = '<div style="padding:20px;color:var(--text2);text-align:center;">加载中…</div>';

            try {
                const [detailResp, logsResp] = await Promise.all([
                    fetch(`${getApiBase()}/api/dashboard/agents/${encodeURIComponent(agentId)}`),
                    fetch(`${getApiBase()}/api/dashboard/agents/${encodeURIComponent(agentId)}/logs?limit=50`)
                ]);
                const detail = (await detailResp.json()).data;
                const logs = (await logsResp.json()).data || [];

                document.getElementById('detailTitle').textContent = detail.mainframeName || agentId;
                body.innerHTML = renderDetail(detail, logs);
            } catch (e) {
                body.innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>加载失败: ${escapeHtml(e.message)}</div></div>`;
            }
        }

        function renderDetail(d, logs) {
            let html = '';

            // ---- Hardware Info ----
            html += `<div class="detail-section">
                <h3>🖥️ 硬件信息</h3>
                <div class="info-grid">
                    ${infoItem('操作系统', [d.osName, d.osVersion].filter(Boolean).join(' '))}
                    ${infoItem('系统类型', d.osType)}
                    ${infoItem('CPU', d.cpuType)}
                    ${infoItem('CPU 频率', d.cpuSpeed)}
                    ${infoItem('CPU 核心', d.cpuCores)}
                    ${infoItem('CPU 使用率', d.cpuUsage)}
                    ${infoItem('内存', `${d.ramUsage || '?'} / ${d.ramCapacity || '?'} (可用 ${d.ramAvailable || '?'})`)}
                    ${infoItem('内存规格', [d.ramType, d.ramSpeed, d.ramManufacturer].filter(Boolean).join(' · '))}
                    ${infoItem('主板', d.mainBoard)}
                    ${infoItem('硬盘', d.disk)}
                    ${infoItemWide('GPU', (d.gpu || '').split('|').filter(Boolean).join('\n'))}
                    ${infoItem('进程总数', d.processCount)}
                    ${infoItem('上报时间', d.feedbackTime)}
                </div>
            </div>`;

            // ---- Disk Partitions ----
            const parts = d.parts || [];
            if (parts.length > 0) {
                html += `<div class="detail-section">
                    <h3>💾 磁盘分区</h3>
                    <div class="disk-list">
                        ${parts.map(p => {
                    const total = parseMB(p.capacity);
                    const avail = parseMB(p.availableCapacity);
                    const used = total - avail;
                    const pct = total > 0 ? Math.round((used / total) * 100) : 0;
                    return `<div class="disk-row">
                                <span class="disk-mount">${escapeHtml(p.mountPoint)}:</span>
                                <div class="disk-bar-wrap">
                                    <div class="disk-bar"><div class="disk-fill" style="width:${pct}%;background:${usageColor(pct)}"></div></div>
                                </div>
                                <span class="disk-meta">${formatSize(used)} / ${formatSize(total)} (${pct}%)</span>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }

            // ---- Process Status ----
            const psList = d.processStatusList || [];
            if (psList.length > 0) {
                html += `<div class="detail-section">
                    <h3>📋 应用进程状态</h3>
                    <div class="process-list">
                        ${psList.map(p => {
                    const isOk = p.status === '正常';
                    return `<div class="process-row" onclick="viewProcessLogs('${escapeHtml(d.agentId)}', '${escapeHtml(p.processName)}')">
                                <span class="process-name">${escapeHtml(p.processName)}</span>
                                <span class="process-status ${isOk ? 'ok' : 'error'}">${escapeHtml(p.status)}</span>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }

            // ---- Alert Rules Button ----
            html += `<div class="detail-section">
                <h3>⚙️ 告警规则</h3>
                <button class="btn-add-rule" onclick="openRuleModal('${escapeHtml(d.agentId)}')">
                    🔧 管理告警规则 (${escapeHtml(d.agentId ? d.agentId.substring(0, 12) + '…' : '')})
                </button>
            </div>`;

            // ---- Error Logs ----
            html += `<div class="detail-section">
                <h3>🚨 错误日志 (最近 50 条)</h3>
                <div class="log-timeline" id="logTimeline">
                    ${logs.length === 0 ? '<div style="padding:16px;text-align:center;color:var(--text2);font-size:12px;">暂无错误日志 ✨</div>' :
                    logs.map(l => `<div class="log-row">
                        <div class="log-time">${l.createTime ? new Date(l.createTime).toLocaleString('zh-CN', { hour12: false }) : '—'}</div>
                        <span class="log-level ${l.level}">${l.level}</span>
                        <span style="font-size:11px;color:var(--text2);">[${escapeHtml(l.appName || '—')}]</span>
                        <span style="font-size:11px;margin-left:4px;">${escapeHtml(l.matchedRuleName || '')}</span>
                        <div class="log-content">${escapeHtml((l.logContent || '').substring(0, 200))}</div>
                    </div>`).join('')}
                </div>
            </div>`;

            return html;
        }

        function infoItem(label, value) {
            return `<div class="info-item"><div class="label">${label}</div><div class="value">${escapeHtml(String(value || '—'))}</div></div>`;
        }
        function infoItemWide(label, value) {
            return `<div class="info-item wide"><div class="label">${label}</div><div class="value" style="white-space:pre-line;">${escapeHtml(String(value || '—'))}</div></div>`;
        }

        function viewProcessLogs(agentId, processName) {
            // Scroll to logs section and highlight relevant ones
            const timeline = document.getElementById('logTimeline');
            if (timeline) timeline.scrollIntoView({ behavior: 'smooth' });
        }

        // ========== Auto Refresh ==========
        function startCountdown() {
            countdownVal = refreshInterval;
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                countdownVal--;
                document.getElementById('countdown').textContent = countdownVal;
                if (countdownVal <= 0) {
                    loadDashboard();
                    countdownVal = refreshInterval;
                }
            }, 1000);
        }

        // ========== Alert Banner ==========
        async function loadAlerts() {
            try {
                const resp = await fetch(`${getApiBase()}/api/alert/events/unacknowledged`);
                const result = await resp.json();
                const events = (result.code === 200 ? result.data : []) || [];
                const banner = document.getElementById('alertBanner');
                const list = document.getElementById('alertList');
                document.getElementById('alertCount').textContent = events.length;
                if (events.length === 0) {
                    banner.classList.remove('show');
                    return;
                }
                banner.classList.add('show');
                list.innerHTML = events.map(e => `<div class="alert-item">
                    <span class="alert-level-tag ${e.alertLevel}">${e.alertLevel}</span>
                    <span class="alert-msg">${escapeHtml(e.message || e.ruleName || '告警')}</span>
                    <span class="alert-time">${e.createTime ? new Date(e.createTime).toLocaleTimeString('zh-CN', { hour12: false }) : ''}</span>
                    <button class="btn-ack" onclick="ackAlert(${e.id})">✓ 确认</button>
                </div>`).join('');
            } catch (e) { /* ignore */ }
        }

        async function ackAlert(id) {
            await fetch(`${getApiBase()}/api/alert/events/${id}/ack`, { method: 'POST' });
            loadAlerts();
        }

        async function ackAllAlerts() {
            await fetch(`${getApiBase()}/api/alert/events/ack-all`, { method: 'POST' });
            loadAlerts();
        }

        // ========== Rule Config Modal ==========
        let ruleModalAgentId = null;
        let cachedPartitions = []; // 缓存当前 agent 的磁盘分区

        async function openRuleModal(agentId) {
            ruleModalAgentId = agentId;
            document.getElementById('ruleModalTitle').textContent = '告警规则 — ' + (agentId.length > 12 ? agentId.substring(0, 12) + '…' : agentId);
            document.getElementById('ruleModal').classList.add('show');
            document.getElementById('addRuleForm').style.display = 'none';
            // 缓存分区数据
            try {
                const resp = await fetch(`${getApiBase()}/api/dashboard/agents/${encodeURIComponent(agentId)}`);
                const r = await resp.json();
                cachedPartitions = (r.data && r.data.parts) ? r.data.parts.map(p => p.mountPoint) : [];
            } catch (e) { cachedPartitions = []; }
            loadRules(agentId);
        }

        function closeRuleModal() {
            document.getElementById('ruleModal').classList.remove('show');
            ruleModalAgentId = null;
        }

        async function loadRules(agentId) {
            const container = document.getElementById('ruleListContainer');
            container.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:11px;text-align:center;">加载中…</div>';
            try {
                const resp = await fetch(`${getApiBase()}/api/alert/rules/applicable?agentId=${encodeURIComponent(agentId)}`);
                const result = await resp.json();
                const rules = (result.code === 200 ? result.data : []) || [];
                if (rules.length === 0) {
                    container.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:11px;text-align:center;">暂无规则，点击下方添加</div>';
                    return;
                }
                const TL = { CPU_USAGE: 'CPU', RAM_USAGE: 'RAM', DISK_USAGE: '磁盘', DISK_PARTITION: '分区', PROCESS_ABNORMAL: '进程异常', AGENT_OFFLINE: '离线' };
                const OL = { GT: '>', GTE: '≥', LT: '<', LTE: '≤', EQ: '=' };
                const NN = ['PROCESS_ABNORMAL', 'AGENT_OFFLINE'];

                container.innerHTML = rules.map(r => {
                    const scope = r.agentId === '*' ? ' (全局)' : '';
                    let exprStr = '';
                    try {
                        const expr = JSON.parse(r.conditions || '{}');
                        const topLogic = expr.logic || 'OR';
                        const groups = expr.groups || [];
                        const groupStrs = groups.map(g => {
                            const gl = g.logic || 'OR';
                            const items = (g.items || []).map(c => {
                                const tl = TL[c.metricType] || c.metricType;
                                const tgt = c.targetName ? `[${escapeHtml(c.targetName)}]` : '';
                                if (NN.includes(c.metricType)) return `${tl}${tgt}`;
                                const op = OL[c.operator] || c.operator;
                                const unit = (c.metricType || '').includes('USAGE') ? '%' : '';
                                return `${tl}${tgt}${op}${c.threshold}${unit}`;
                            });
                            const glLabel = gl === 'AND' ? ' 且 ' : ' 或 ';
                            return items.length > 1 ? `(${items.join(glLabel)})` : items[0] || '';
                        });
                        const tlLabel = topLogic === 'AND' ? ' 且 ' : ' 或 ';
                        exprStr = groupStrs.join(tlLabel);
                    } catch (e) { exprStr = '(解析失败)'; }
                    return `<div class="rule-item">
                        <span class="alert-level-tag ${r.alertLevel}" style="flex-shrink:0">${r.alertLevel}</span>
                        <div class="rule-info">
                            <div class="rule-name">${escapeHtml(r.ruleName)}${scope}</div>
                            <div class="rule-desc">${exprStr} · 冷却${r.cooldownSec}s · ${r.enabled ? '✅' : '❌'}</div>
                        </div>
                        ${r.agentId !== '*' ? `<button class="btn-del" onclick="deleteRule(${r.id})" title="删除">🗑</button>` : ''}
                    </div>`;
                }).join('');
            } catch (e) {
                container.innerHTML = `<div style="padding:10px;color:var(--red);font-size:11px;">加载失败: ${e.message}</div>`;
            }
        }

        // ========== 分组条件管理 ==========
        const METRIC_OPTIONS = [
            { value: 'CPU_USAGE', label: 'CPU 使用率', numeric: true },
            { value: 'RAM_USAGE', label: '内存使用率', numeric: true },
            { value: 'DISK_USAGE', label: '总磁盘使用率', numeric: true },
            { value: 'DISK_PARTITION', label: '磁盘分区(可用MB)', numeric: true },
            { value: 'PROCESS_ABNORMAL', label: '进程异常', numeric: false },
            { value: 'AGENT_OFFLINE', label: 'Agent离线', numeric: false }
        ];
        const OP_OPTIONS = [
            { value: 'GT', label: '> 大于' }, { value: 'GTE', label: '≥ 大于等于' },
            { value: 'LT', label: '< 小于' }, { value: 'LTE', label: '≤ 小于等于' },
            { value: 'EQ', label: '= 等于' }
        ];
        let topLogic = 'AND';
        let groupCounter = 0;

        function showAddRuleForm() {
            document.getElementById('addRuleForm').style.display = 'block';
            document.getElementById('newRuleName').value = '';
            document.getElementById('newCooldown').value = '300';
            document.getElementById('groupsContainer').innerHTML = '';
            topLogic = 'AND';
            groupCounter = 0;
            updateTopLogicBtn();
            addGroup(); // 默认一个分组
        }

        function toggleTopLogic() {
            topLogic = topLogic === 'AND' ? 'OR' : 'AND';
            updateTopLogicBtn();
        }

        function updateTopLogicBtn() {
            const btn = document.getElementById('topLogicToggle');
            btn.textContent = topLogic === 'AND' ? '组间: 且 AND' : '组间: 或 OR';
            btn.style.background = topLogic === 'AND' ? 'rgba(108,92,231,0.2)' : 'var(--surface2)';
            btn.style.borderColor = topLogic === 'AND' ? 'var(--accent)' : 'var(--border)';
            document.querySelectorAll('.group-divider').forEach(d => {
                d.textContent = topLogic === 'AND' ? '且 AND' : '或 OR';
            });
        }

        function addGroup() {
            const container = document.getElementById('groupsContainer');
            const gIdx = groupCounter++;
            // 组间分隔
            if (container.children.length > 0) {
                const divider = document.createElement('div');
                divider.className = 'group-divider';
                divider.style.cssText = 'text-align:center;font-size:11px;font-weight:700;color:var(--accent);padding:6px 0;';
                divider.textContent = topLogic === 'AND' ? '且 AND' : '或 OR';
                container.appendChild(divider);
            }
            const groupEl = document.createElement('div');
            groupEl.className = 'cond-group';
            groupEl.dataset.gidx = gIdx;
            groupEl.style.cssText = 'border:1px solid var(--accent);border-radius:8px;padding:8px;background:var(--surface2);';
            groupEl.innerHTML = `
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
                    <span style="font-size:10px;color:var(--accent);font-weight:600;">条件组 ${gIdx + 1}</span>
                    <button class="grp-logic-btn" onclick="toggleGroupLogic(this)" style="font-size:9px;padding:1px 8px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:3px;cursor:pointer;">组内: 或 OR</button>
                    <span style="flex:1"></span>
                    <button onclick="addConditionToGroup(this)" style="font-size:10px;padding:1px 8px;border:1px dashed var(--cyan);background:none;color:var(--cyan);border-radius:3px;cursor:pointer;">+ 条件</button>
                    <button onclick="removeGroup(this)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;" title="删除组">✕</button>
                </div>
                <div class="group-items" style="display:flex;flex-direction:column;gap:4px;"></div>`;
            container.appendChild(groupEl);
            addConditionToGroup(groupEl.querySelector('[onclick*="addConditionToGroup"]'));
        }

        function toggleGroupLogic(btn) {
            const cur = btn.textContent.includes('OR') ? 'AND' : 'OR';
            btn.textContent = cur === 'AND' ? '组内: 且 AND' : '组内: 或 OR';
            btn.style.background = cur === 'AND' ? 'rgba(0,206,209,0.15)' : 'var(--surface)';
            // 同步更新组内分隔线
            const group = btn.closest('.cond-group');
            group.querySelectorAll('.item-divider').forEach(d => {
                d.textContent = cur === 'AND' ? '且 AND' : '或 OR';
            });
        }

        function removeGroup(btn) {
            const group = btn.closest('.cond-group');
            const prev = group.previousElementSibling;
            const next = group.nextElementSibling;
            if (prev && prev.classList.contains('group-divider')) prev.remove();
            if (next && next.classList.contains('group-divider')) next.remove();
            group.remove();
            const container = document.getElementById('groupsContainer');
            if (container.firstElementChild && container.firstElementChild.classList.contains('group-divider')) {
                container.firstElementChild.remove();
            }
        }

        function addConditionToGroup(btn) {
            const group = btn.closest('.cond-group');
            const itemsContainer = group.querySelector('.group-items');
            // 组内逻辑分隔线(非第一行时)
            if (itemsContainer.querySelectorAll('.cond-row').length > 0) {
                const logicBtn = group.querySelector('.grp-logic-btn');
                const gl = logicBtn.textContent.includes('AND') ? 'AND' : 'OR';
                const divider = document.createElement('div');
                divider.className = 'item-divider';
                divider.style.cssText = 'text-align:center;font-size:9px;font-weight:700;color:var(--cyan);padding:2px 0;';
                divider.textContent = gl === 'AND' ? '且 AND' : '或 OR';
                itemsContainer.appendChild(divider);
            }
            const metricOpts = METRIC_OPTIONS.map(m => `<option value="${m.value}">${m.label}</option>`).join('');
            const opOpts = OP_OPTIONS.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
            const row = document.createElement('div');
            row.className = 'cond-row';
            row.style.cssText = 'background:var(--bg);border:1px solid var(--cyan);border-radius:5px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;';
            row.innerHTML = `
                <select class="cond-metric" onchange="onCondMetricChange(this)" style="flex:1;min-width:110px;padding:3px 5px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;">
                    ${metricOpts}
                </select>
                <select class="cond-op" style="width:85px;padding:3px 5px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;">
                    ${opOpts}
                </select>
                <input class="cond-threshold" type="number" value="80" style="width:55px;padding:3px 5px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;">
                <input class="cond-target" placeholder="目标" style="width:70px;padding:3px 5px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;">
                <button onclick="removeCondRow(this)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0 3px;" title="删除">✕</button>`;
            itemsContainer.appendChild(row);
        }

        function onCondMetricChange(select) {
            const row = select.closest('.cond-row');
            const metric = select.value;
            const mo = METRIC_OPTIONS.find(m => m.value === metric);
            const isNumeric = mo ? mo.numeric : true;
            const opEl = row.querySelector('.cond-op');
            const thEl = row.querySelector('.cond-threshold');
            opEl.disabled = !isNumeric;
            thEl.disabled = !isNumeric;
            opEl.style.opacity = isNumeric ? '1' : '0.4';
            thEl.style.opacity = isNumeric ? '1' : '0.4';
            // 磁盘分区 → 目标改为下拉
            const oldTarget = row.querySelector('.cond-target');
            if (metric === 'DISK_PARTITION' && cachedPartitions.length > 0) {
                const sel = document.createElement('select');
                sel.className = 'cond-target';
                sel.style.cssText = oldTarget.style.cssText;
                sel.innerHTML = cachedPartitions.map(p => `<option value="${p}">${p}:</option>`).join('');
                oldTarget.replaceWith(sel);
            } else if (oldTarget.tagName === 'SELECT') {
                const inp = document.createElement('input');
                inp.className = 'cond-target';
                inp.placeholder = '目标';
                inp.style.cssText = oldTarget.style.cssText;
                oldTarget.replaceWith(inp);
            }
        }

        function removeCondRow(btn) {
            const row = btn.closest('.cond-row');
            const container = row.parentElement;
            const prev = row.previousElementSibling;
            const next = row.nextElementSibling;
            // 删除相邻的组内分隔线
            if (prev && prev.classList.contains('item-divider')) prev.remove();
            else if (next && next.classList.contains('item-divider')) next.remove();
            row.remove();
        }

        async function submitNewRule() {
            const groupEls = document.querySelectorAll('#groupsContainer .cond-group');
            if (groupEls.length === 0) { alert('请至少添加一个条件组'); return; }

            const groups = Array.from(groupEls).map(gEl => {
                const logicBtn = gEl.querySelector('.grp-logic-btn');
                const groupLogic = logicBtn.textContent.includes('AND') ? 'AND' : 'OR';
                const items = Array.from(gEl.querySelectorAll('.cond-row')).map(row => ({
                    metricType: row.querySelector('.cond-metric').value,
                    operator: row.querySelector('.cond-op').value,
                    threshold: parseFloat(row.querySelector('.cond-threshold').value) || 0,
                    targetName: row.querySelector('.cond-target').value || null
                }));
                return { logic: groupLogic, items };
            }).filter(g => g.items.length > 0);

            if (groups.length === 0) { alert('条件组内需要至少一个条件'); return; }

            const expression = { logic: topLogic, groups };
            const rule = {
                agentId: ruleModalAgentId,
                ruleName: document.getElementById('newRuleName').value || '未命名规则',
                conditions: JSON.stringify(expression),
                alertLevel: document.getElementById('newAlertLevel').value,
                cooldownSec: parseInt(document.getElementById('newCooldown').value) || 300,
                enabled: true
            };

            try {
                await fetch(`${getApiBase()}/api/alert/rules`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rule)
                });
                document.getElementById('addRuleForm').style.display = 'none';
                loadRules(ruleModalAgentId);
            } catch (e) { alert('创建失败: ' + e.message); }
        }

        async function deleteRule(id) {
            if (!confirm('确定删除此规则？')) return;
            await fetch(`${getApiBase()}/api/alert/rules/${id}`, { method: 'DELETE' });
            loadRules(ruleModalAgentId);
        }

        // ========== Init ==========
        (function () {
            const h = document.getElementById('apiHost');
            h.value = location.protocol === 'file:' ? 'localhost:8080' : (location.host || 'localhost:8080');
            loadDashboard();
            loadAlerts();
            startCountdown();
            const origLoad = loadDashboard;
            loadDashboard = async function () { await origLoad(); loadAlerts(); };
        })();
    </script>

    <!-- Rule Configuration Modal -->
    <div class="modal-overlay" id="ruleModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="ruleModalTitle">告警规则</h2>
                <button class="btn-close" onclick="closeRuleModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="rule-list" id="ruleListContainer"></div>
                <button class="btn-add-rule" onclick="showAddRuleForm()">+ 添加新规则</button>
                <div class="add-rule-form" id="addRuleForm" style="display:none;">
                    <div class="form-row">
                        <div class="form-group"><label>规则名称</label><input id="newRuleName" placeholder="如: 综合告警"></div>
                        <div class="form-group"><label>告警级别</label>
                            <select id="newAlertLevel">
                                <option value="WARNING">⚠️ WARNING</option>
                                <option value="CRITICAL">🔴 CRITICAL</option>
                            </select>
                        </div>
                        <div class="form-group"><label>冷却(秒)</label><input id="newCooldown" type="number" value="300">
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                        <span style="font-size:11px;color:var(--text2);font-weight:600;">条件分组</span>
                        <button id="topLogicToggle" onclick="toggleTopLogic()"
                            style="font-size:9px;padding:2px 10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:4px;cursor:pointer;">组间:
                            且 AND</button>
                        <span style="flex:1"></span>
                        <button onclick="addGroup()"
                            style="font-size:10px;padding:2px 10px;border:1px dashed var(--border);background:none;color:var(--cyan);border-radius:4px;cursor:pointer;">+
                            添加组</button>
                    </div>
                    <div id="groupsContainer" style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">
                    </div>
                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                        <button class="btn-secondary"
                            onclick="document.getElementById('addRuleForm').style.display='none'">取消</button>
                        <button class="btn-primary" onclick="submitNewRule()">创建规则</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
