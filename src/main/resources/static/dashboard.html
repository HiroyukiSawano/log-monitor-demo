<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2d3250;
            --text: #e1e4ed;
            --text2: #8b8fa3;
            --accent: #6c5ce7;
            --green: #00b894;
            --yellow: #fdcb6e;
            --red: #e17055;
            --blue: #74b9ff;
            --cyan: #81ecec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ========== Header ========== */
        header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        header .nav-link {
            margin-left: auto;
            color: var(--blue);
            text-decoration: none;
            font-size: 13px;
            opacity: 0.8;
        }

        header .nav-link+.nav-link {
            margin-left: 0;
        }

        header .nav-link:hover {
            opacity: 1;
        }

        /* ========== Toolbar ========== */
        .toolbar {
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .toolbar label {
            font-size: 12px;
            color: var(--text2);
        }

        .toolbar input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            width: 200px;
        }

        .toolbar input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toolbar .refresh-info {
            margin-left: auto;
            font-size: 11px;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar .countdown {
            color: var(--cyan);
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* ========== Stats Bar ========== */
        .stats-bar {
            display: flex;
            gap: 14px;
            padding: 12px 24px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            font-size: 24px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text2);
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        /* ========== Main Layout ========== */
        .main {
            display: flex;
            height: calc(100vh - 156px);
        }

        /* ========== Agent Cards Grid ========== */
        .cards-section {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 14px;
        }

        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            position: relative;
        }

        .agent-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.15);
            transform: translateY(-2px);
        }

        .agent-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.3);
        }

        .agent-card.offline {
            opacity: 0.65;
        }

        .card-header {
            padding: 12px 14px 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
        }

        .online-dot.on {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                box-shadow: 0 0 4px var(--green);
            }

            50% {
                box-shadow: 0 0 12px var(--green);
            }
        }

        .online-dot.off {
            background: var(--red);
        }

        .card-hostname {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge-alert {
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .card-os {
            padding: 0 14px;
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .card-metrics {
            padding: 0 14px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .metric-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .metric-label {
            width: 36px;
            color: var(--text2);
            font-weight: 600;
            flex-shrink: 0;
        }

        .metric-bar {
            flex: 1;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .metric-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .metric-val {
            width: 38px;
            text-align: right;
            font-weight: 600;
            font-size: 10px;
        }

        .card-footer {
            padding: 6px 14px;
            font-size: 10px;
            color: var(--text2);
            border-top: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-footer .agent-id {
            font-family: 'Consolas', monospace;
            font-size: 9px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== Detail Side Panel ========== */
        .detail-panel {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            border-left: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
        }

        .detail-panel.open {
            width: 480px;
        }

        .detail-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-header h2 {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-close:hover {
            background: var(--bg);
            color: var(--text);
        }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
        }

        .detail-section {
            margin-bottom: 16px;
        }

        .detail-section h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text2);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Hardware Info Table */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .info-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .info-item .label {
            font-size: 10px;
            color: var(--text2);
            margin-bottom: 2px;
        }

        .info-item .value {
            font-size: 12px;
            font-weight: 600;
        }

        .info-item.wide {
            grid-column: 1 / -1;
        }

        /* Process List */
        .process-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .process-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .process-row:hover {
            border-color: var(--accent);
        }

        .process-name {
            flex: 1;
            font-size: 12px;
            font-weight: 500;
        }

        .process-status {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
        }

        .process-status.ok {
            background: rgba(0, 184, 148, 0.15);
            color: var(--green);
        }

        .process-status.error {
            background: rgba(225, 112, 85, 0.15);
            color: var(--red);
        }

        /* Disk Partitions */
        .disk-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .disk-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .disk-mount {
            font-size: 13px;
            font-weight: 700;
            min-width: 30px;
            max-width: 120px;
            color: var(--cyan);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .disk-bar-wrap {
            flex: 1;
        }

        .disk-bar {
            height: 8px;
            background: var(--surface2);
            border-radius: 4px;
            overflow: hidden;
        }

        .disk-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .disk-meta {
            font-size: 10px;
            color: var(--text2);
            white-space: nowrap;
        }

        /* Log Timeline */
        .log-timeline {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-row {
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
        }

        .log-row .log-time {
            font-size: 10px;
            color: var(--text2);
            margin-bottom: 2px;
        }

        .log-row .log-level {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            margin-right: 4px;
        }

        .log-level.CRITICAL {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .log-level.UNKNOWN_ERROR {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .log-row .log-content {
            font-family: 'Consolas', monospace;
            font-size: 10px;
            color: var(--text);
            word-break: break-all;
            max-height: 60px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        /* ========== Alert Banner ========== */
        .alert-banner {
            display: none;
            background: linear-gradient(90deg, rgba(225, 112, 85, 0.12) 0%, rgba(253, 203, 110, 0.08) 100%);
            border-bottom: 1px solid rgba(225, 112, 85, 0.3);
            padding: 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .alert-banner.show {
            display: block;
        }

        .alert-banner-header {
            display: flex;
            align-items: center;
            padding: 6px 24px;
            gap: 8px;
            position: sticky;
            top: 0;
            background: rgba(15, 17, 23, 0.9);
            z-index: 2;
        }

        .alert-banner-header .title {
            font-size: 12px;
            font-weight: 600;
            color: var(--red);
            flex: 1;
        }

        .alert-banner-header .btn-ack-all {
            font-size: 10px;
            padding: 2px 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            border-radius: 4px;
            cursor: pointer;
        }

        .alert-banner-header .btn-ack-all:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 24px;
            font-size: 11px;
            border-top: 1px solid rgba(45, 50, 80, 0.3);
        }

        .alert-item .alert-level-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 3px;
        }

        .alert-level-tag.CRITICAL {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .alert-level-tag.WARNING {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .alert-item .alert-msg {
            flex: 1;
            color: var(--text);
        }

        .alert-item .alert-time {
            color: var(--text2);
            font-size: 10px;
        }

        .alert-item .btn-ack {
            font-size: 10px;
            padding: 1px 8px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text2);
            border-radius: 3px;
            cursor: pointer;
        }

        .alert-item .btn-ack:hover {
            border-color: var(--green);
            color: var(--green);
        }

        /* ========== Rule Config Modal ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 560px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-header h2 {
            font-size: 15px;
            flex: 1;
        }

        .modal-body {
            padding: 16px 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text2);
            margin-bottom: 3px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 6px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            font-size: 12px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-primary {
            padding: 6px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            padding: 6px 18px;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-secondary:hover {
            border-color: var(--text2);
        }

        .rule-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 11px;
        }

        .rule-item .rule-info {
            flex: 1;
        }

        .rule-item .rule-name {
            font-weight: 600;
            color: var(--text);
        }

        .rule-item .rule-desc {
            color: var(--text2);
            font-size: 10px;
            margin-top: 2px;
        }

        .rule-item .btn-del {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            opacity: 0.7;
        }

        .rule-item .btn-del:hover {
            opacity: 1;
        }

        .rule-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-action,
        .btn-open {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 10px;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-action:hover,
        .btn-open:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .btn-action.danger {
            color: var(--red);
        }

        .btn-action.danger:hover {
            border-color: var(--red);
        }

        .btn-open {
            color: var(--blue);
        }

        .inline-check {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 0 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 5px;
            font-size: 12px;
        }

        .inline-check input {
            width: auto;
        }

        .notice-card {
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 11px;
            line-height: 1.6;
        }

        .notice-card.success {
            border-color: rgba(0, 184, 148, 0.35);
            color: var(--green);
        }

        .notice-card.error {
            border-color: rgba(225, 112, 85, 0.35);
            color: var(--red);
        }

        .notice-card a {
            color: var(--blue);
            text-decoration: underline;
        }

        .btn-add-rule {
            width: 100%;
            padding: 8px;
            background: var(--surface2);
            border: 1px dashed var(--border);
            color: var(--text2);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 6px;
        }

        .btn-add-rule:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .add-rule-form {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        /* Filter Rule Tags */
        .ftag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
        }

        .ftag-critical {
            background: rgba(225, 112, 85, 0.2);
            color: var(--red);
        }

        .ftag-exclude {
            background: rgba(0, 184, 148, 0.2);
            color: var(--green);
        }

        .ftag-basic {
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
        }

        .ftag-global {
            background: rgba(116, 185, 255, 0.15);
            color: var(--blue);
            font-size: 9px;
            margin-left: 4px;
        }

        /* Scrollbar style */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text2);
        }
    </style>
</head>

<body>
    <header>
        <h1>📊 Monitoring Dashboard</h1>
        <a href="debug.html" class="nav-link">Debug Console</a>
        <a href="command.html" class="nav-link">Remote Command</a>
        <a href="logs.html" class="nav-link">Log Hits</a>
    </header>

    <div class="toolbar">
        <label>Server Host</label>
        <input type="text" id="apiHost" placeholder="localhost:8080">
        <div class="refresh-info">
            自动刷新 <span class="countdown" id="countdown">15</span>s
            <span id="lastRefreshTime">—</span>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-icon">🖥️</span>
            <div>
                <div class="stat-label">总服务器</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🟢</span>
            <div>
                <div class="stat-label">在线</div>
                <div class="stat-value" id="statOnline" style="color:var(--green)">0</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-icon">🔴</span>
            <div>
                <div class="stat-label">离线</div>
                <div class="stat-value" id="statOffline" style="color:var(--red)">0</div>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-icon">⚠️</span>
            <div>
                <div class="stat-label">进程异常</div>
                <div class="stat-value" id="statAlerts" style="color:var(--yellow)">0</div>
            </div>
        </div>
    </div>

    <!-- Alert Notification Banner -->
    <div class="alert-banner" id="alertBanner">
        <div class="alert-banner-header">
            <span class="title">🔔 未确认告警 (<span id="alertCount">0</span>)</span>
            <button class="btn-ack-all" onclick="ackAllAlerts()">全部确认</button>
        </div>
        <div id="alertList"></div>
    </div>

    <div class="main">
        <div class="cards-section" id="cardsSection">
            <div class="cards-grid" id="cardsGrid">
                <div class="empty-state">
                    <div class="icon">📡</div>
                    <div>正在加载服务器数据…</div>
                </div>
            </div>
        </div>

        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <h2 id="detailTitle">服务器详情</h2>
                <button class="btn-close" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <script>
        // ========== Config ==========
        let refreshInterval = 15;
        let countdownVal = refreshInterval;
        let countdownTimer = null;
        let selectedAgentId = null;

        function getApiBase() { return `http://${document.getElementById('apiHost').value}`; }
        function escapeHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
        function escapeAttr(s) { return s ? escapeHtml(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;') : ''; }

        // ========== Color Helpers ==========
        function usageColor(pct) {
            if (pct >= 80) return 'var(--red)';
            if (pct >= 50) return 'var(--yellow)';
            return 'var(--green)';
        }

        function parsePct(str) {
            if (!str) return 0;
            return parseFloat(str.replace('%', '')) || 0;
        }

        function parseMB(str) {
            if (!str) return 0;
            let v = parseFloat(str);
            return isNaN(v) ? 0 : v;
        }

        function formatSize(mb) {
            if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
            return mb + ' MB';
        }

        // ========== Load Data ==========
        async function loadDashboard() {
            try {
                const resp = await fetch(`${getApiBase()}/api/dashboard/agents`);
                const result = await resp.json();
                if (result.code !== 200) { console.error(result.message); return; }
                const agents = result.data || [];

                // Stable sort: online first, then by ID alphabetically
                agents.sort((a, b) => {
                    if (a.online && !b.online) return -1;
                    if (!a.online && b.online) return 1;
                    return (a.agentId || '').localeCompare(b.agentId || '');
                });

                renderCards(agents);
                updateStats(agents);

                // Refresh detail panel if one is selected (silent refresh)
                if (selectedAgentId) {
                    loadDetail(selectedAgentId, true);
                }

                document.getElementById('lastRefreshTime').textContent =
                    new Date().toLocaleTimeString('zh-CN', { hour12: false });
            } catch (e) {
                console.error('加载失败:', e);
            }
        }

        function updateStats(agents) {
            const total = agents.length;
            const online = agents.filter(a => a.online).length;
            const offline = total - online;
            let alerts = 0;
            agents.forEach(a => {
                if (a.processStatusList) {
                    a.processStatusList.forEach(p => {
                        if (p.status !== '正常') alerts++;
                    });
                }
            });
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statOnline').textContent = online;
            document.getElementById('statOffline').textContent = offline;
            document.getElementById('statAlerts').textContent = alerts;
        }

        // ========== Render Cards ==========
        function renderCards(agents) {
            const grid = document.getElementById('cardsGrid');
            if (agents.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📡</div><div>暂无服务器数据</div><div style="font-size:11px;margin-top:4px;color:var(--text2)">等待 Agent 上报 METRICS…</div></div>`;
                return;
            }

            // Remove the empty state message if it exists
            const emptyState = grid.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Track existing ids to remove stale cards
            const currentIds = new Set(agents.map(a => a.agentId));
            Array.from(grid.children).forEach(child => {
                if (child.dataset.id && !currentIds.has(child.dataset.id)) {
                    grid.removeChild(child);
                }
            });

            // Update or create cards
            agents.forEach(a => {
                const isOnline = a.online;
                const hostname = a.mainframeName || '未知主机';
                const osInfo = [a.osName, a.osVersion].filter(Boolean).join(' ') || '—';
                const cpuPct = parsePct(a.cpuUsage);
                const totalDisk = parseMB(a.totalDiskCapacity);
                const availDisk = parseMB(a.totalAvailableCapacityDisk);
                const diskPct = totalDisk > 0 ? Math.round(((totalDisk - availDisk) / totalDisk) * 100) : 0;

                // Parse RAM usage
                let ramPct = 0;
                if (a.ramCapacity && a.ramUsage) {
                    const ramTotal = parseFloat(a.ramCapacity);
                    const ramUsed = parseFloat(a.ramUsage);
                    if (ramTotal > 0) ramPct = Math.round((ramUsed / ramTotal) * 100);
                }

                // Count process alerts
                let alertCount = 0;
                if (a.processStatusList) {
                    a.processStatusList.forEach(p => { if (p.status !== '正常') alertCount++; });
                }

                const active = selectedAgentId === a.agentId ? ' active' : '';
                const offlineClass = isOnline ? '' : ' offline';

                let card = grid.querySelector(`[data-id="${a.agentId}"]`);
                const cardHTML = `
                    ${alertCount > 0 ? `<div class="badge-alert" style="position:absolute;top:10px;right:10px;">${alertCount}</div>` : ''}
                    <div class="card-header">
                        <div class="online-dot ${isOnline ? 'on' : 'off'}"></div>
                        <div class="card-hostname">${escapeHtml(hostname)}</div>
                    </div>
                    <div class="card-os">${escapeHtml(osInfo)}</div>
                    <div class="card-metrics">
                        ${metricBar('CPU', cpuPct)}
                        ${metricBar('RAM', ramPct)}
                        ${metricBar('Disk', diskPct)}
                    </div>
                    <div class="card-footer">
                        <span>${isOnline ? '🟢 在线' : '🔴 离线'}</span>
                        <span style="flex:1"></span>
                        <span class="agent-id" title="${escapeHtml(a.agentId)}">${escapeHtml(a.agentId ? a.agentId.substring(0, 12) + '…' : '')}</span>
                    </div>
                `;

                if (card) {
                    // Update classes (keeping active if set)
                    card.className = `agent-card ${selectedAgentId === a.agentId ? 'active' : ''} ${offlineClass}`;
                    card.innerHTML = cardHTML;
                } else {
                    // Create new card
                    card = document.createElement('div');
                    card.className = `agent-card${active}${offlineClass}`;
                    card.dataset.id = a.agentId;
                    card.onclick = () => selectAgent(a.agentId);
                    card.innerHTML = cardHTML;
                    grid.appendChild(card);
                }
            });

            // Fix ordering visually based on data array order
            agents.forEach(a => {
                const card = grid.querySelector(`[data-id="${a.agentId}"]`);
                if (card && card.parentElement) {
                    grid.appendChild(card);
                }
            });
        }

        function metricBar(label, pct) {
            const color = usageColor(pct);
            return `
            <div class="metric-row">
                <span class="metric-label">${label}</span>
                <div class="metric-bar"><div class="metric-fill" style="width:${pct}%;background:${color}"></div></div>
                <span class="metric-val" style="color:${color}">${pct}%</span>
            </div>`;
        }

        // ========== Detail Panel ==========
        function selectAgent(agentId) {
            selectedAgentId = agentId;
            document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
            // Find and highlight the card
            document.querySelectorAll('.agent-card').forEach(c => {
                if (c.onclick.toString().includes(agentId)) c.classList.add('active');
            });
            loadDetail(agentId);
            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetail() {
            selectedAgentId = null;
            document.getElementById('detailPanel').classList.remove('open');
            document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
        }

        async function loadDetail(agentId, isSilentRefresh = false) {
            const body = document.getElementById('detailBody');

            // Only show loading state if it's a manual click, not an auto-refresh
            if (!isSilentRefresh) {
                body.innerHTML = '<div style="padding:20px;color:var(--text2);text-align:center;">加载中…</div>';
            }

            try {
                const [detailResp, logsResp] = await Promise.all([
                    fetch(`${getApiBase()}/api/dashboard/agents/${encodeURIComponent(agentId)}`),
                    fetch(`${getApiBase()}/api/dashboard/agents/${encodeURIComponent(agentId)}/logs?limit=50`)
                ]);
                const detail = (await detailResp.json()).data;
                const logs = (await logsResp.json()).data || [];

                document.getElementById('detailTitle').textContent = detail.mainframeName || agentId;

                // Save scroll position for silent refreshes
                const st = isSilentRefresh ? body.scrollTop : 0;

                body.innerHTML = renderDetail(detail, logs);

                // Restore scroll position
                if (isSilentRefresh) {
                    body.scrollTop = st;
                }
            } catch (e) {
                body.innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>加载失败: ${escapeHtml(e.message)}</div></div>`;
            }
        }

        function renderDetail(d, logs) {
            let html = '';

            // ---- Hardware Info ----
            html += `<div class="detail-section">
                <h3>🖥️ 硬件信息</h3>
                <div class="info-grid">
                    ${infoItem('操作系统', [d.osName, d.osVersion].filter(Boolean).join(' '))}
                    ${infoItem('系统类型', d.osType)}
                    ${infoItem('CPU', d.cpuType)}
                    ${infoItem('CPU 频率', d.cpuSpeed)}
                    ${infoItem('CPU 核心', d.cpuCores)}
                    ${infoItem('CPU 使用率', d.cpuUsage)}
                    ${infoItem('内存', `${d.ramUsage || '?'} / ${d.ramCapacity || '?'} (可用 ${d.ramAvailable || '?'})`)}
                    ${infoItem('内存规格', [d.ramType, d.ramSpeed, d.ramManufacturer].filter(Boolean).join(' · '))}
                    ${infoItem('主板', d.mainBoard)}
                    ${infoItem('硬盘', d.disk)}
                    ${infoItemWide('GPU', (d.gpu || '').split('|').filter(Boolean).join('\n'))}
                    ${infoItem('进程总数', d.processCount)}
                    ${infoItem('上报时间', d.feedbackTime)}
                </div>
            </div>`;

            // ---- Disk Partitions ----
            const parts = d.parts || [];
            if (parts.length > 0) {
                html += `<div class="detail-section">
                    <h3>💾 磁盘分区</h3>
                    <div class="disk-list">
                        ${parts.map(p => {
                    const total = parseMB(p.capacity);
                    const avail = parseMB(p.availableCapacity);
                    const used = total - avail;
                    const pct = total > 0 ? Math.round((used / total) * 100) : 0;
                    return `<div class="disk-row">
                                <span class="disk-mount">${escapeHtml(p.mountPoint)}:</span>
                                <div class="disk-bar-wrap">
                                    <div class="disk-bar"><div class="disk-fill" style="width:${pct}%;background:${usageColor(pct)}"></div></div>
                                </div>
                                <span class="disk-meta">${formatSize(used)} / ${formatSize(total)} (${pct}%)</span>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }

            // ---- Process Status ----
            const psList = d.processStatusList || [];
            if (psList.length > 0) {
                html += `<div class="detail-section">
                    <h3>📋 应用进程状态</h3>
                    <div class="process-list">
                        ${psList.map(p => {
                    const isOk = p.status === '正常';
                    return `<div class="process-row" onclick="viewProcessLogs('${escapeHtml(d.agentId)}', '${escapeHtml(p.processName)}')">
                                <span class="process-name">${escapeHtml(p.processName)}</span>
                                <span class="process-status ${isOk ? 'ok' : 'error'}">${escapeHtml(p.status)}</span>
                            </div>`;
                }).join('')}
                    </div>
                </div>`;
            }

            // ---- Log Monitor Button ----
            html += `<div class="detail-section">
                <h3>📂 日志监听管理</h3>
                <button class="btn-add-rule" onclick="openLogMonitorModal('${escapeHtml(d.agentId)}')">
                    🔧 管理日志监听 (${escapeHtml(d.agentId ? d.agentId.substring(0, 12) + '…' : '')})
                </button>
            </div>`;

            html += `<div class="detail-section">
                <h3>🖥️ TTYD 管理</h3>
                <button class="btn-add-rule" onclick="openTtydModal('${escapeHtml(d.agentId)}')">
                    🔧 管理 TTYD (${escapeHtml(d.agentId ? d.agentId.substring(0, 12) + '…' : '')})
                </button>
            </div>`;

            // ---- Filter Rules Button ----
            html += `<div class="detail-section">
                <h3>📋 日志过滤规则</h3>
                <button class="btn-add-rule" onclick="openFilterRuleModal('${escapeHtml(d.agentId)}')">
                    🔧 管理过滤规则 (${escapeHtml(d.agentId ? d.agentId.substring(0, 12) + '…' : '')})
                </button>
            </div>`;

            // ---- Alert Rules Button ----
            html += `<div class="detail-section">
                <h3>⚙️ 告警规则</h3>
                <button class="btn-add-rule" onclick="openRuleModal('${escapeHtml(d.agentId)}')">
                    🔧 管理告警规则 (${escapeHtml(d.agentId ? d.agentId.substring(0, 12) + '…' : '')})
                </button>
            </div>`;

            // ---- Hit Logs ----
            html += `<div class="detail-section">
                <h3>🚨 命中日志 (最近 50 条)</h3>
                <div class="log-timeline" id="logTimeline">
                    ${logs.length === 0 ? '<div style="padding:16px;text-align:center;color:var(--text2);font-size:12px;">暂无命中日志 ✨</div>' :
                    logs.map(l => `<div class="log-row">
                        <div class="log-time">${l.createTime ? new Date(l.createTime).toLocaleString('zh-CN', { hour12: false }) : '—'}</div>
                        <span class="log-level ${l.level}">${l.level}</span>
                        <span style="font-size:11px;color:var(--text2);">[${escapeHtml(l.appName || '—')}]</span>
                        <span style="font-size:11px;margin-left:4px;">${escapeHtml(l.matchedRuleName || '')}</span>
                        <span style="font-size:10px;color:var(--cyan);margin-left:4px;">关键字: ${escapeHtml(l.matchedKeyword || '')}</span>
                        <div class="log-content">${escapeHtml((l.logContent || '').substring(0, 300))}</div>
                    </div>`).join('')}
                </div>
            </div>`;

            return html;
        }

        function infoItem(label, value) {
            return `<div class="info-item"><div class="label">${label}</div><div class="value">${escapeHtml(String(value || '—'))}</div></div>`;
        }
        function infoItemWide(label, value) {
            return `<div class="info-item wide"><div class="label">${label}</div><div class="value" style="white-space:pre-line;">${escapeHtml(String(value || '—'))}</div></div>`;
        }

        function viewProcessLogs(agentId, processName) {
            // Scroll to logs section and highlight relevant ones
            const timeline = document.getElementById('logTimeline');
            if (timeline) timeline.scrollIntoView({ behavior: 'smooth' });
        }

        // ========== Auto Refresh ==========
        function startCountdown() {
            countdownVal = refreshInterval;
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                countdownVal--;
                document.getElementById('countdown').textContent = countdownVal;
                if (countdownVal <= 0) {
                    loadDashboard();
                    countdownVal = refreshInterval;
                }
            }, 1000);
        }

        // ========== Alert Banner ==========
        async function loadAlerts() {
            try {
                const resp = await fetch(`${getApiBase()}/api/alert/events/unacknowledged`);
                const result = await resp.json();
                const events = (result.code === 200 ? result.data : []) || [];
                const banner = document.getElementById('alertBanner');
                const list = document.getElementById('alertList');
                document.getElementById('alertCount').textContent = events.length;
                if (events.length === 0) {
                    banner.classList.remove('show');
                    return;
                }
                banner.classList.add('show');
                list.innerHTML = events.map(e => `<div class="alert-item">
                    <span class="alert-level-tag ${e.alertLevel}">${e.alertLevel}</span>
                    <span class="alert-msg">${escapeHtml(e.message || e.ruleName || '告警')}</span>
                    <span class="alert-time">${e.createTime ? new Date(e.createTime).toLocaleTimeString('zh-CN', { hour12: false }) : ''}</span>
                    <button class="btn-ack" onclick="ackAlert(${e.id})">✓ 确认</button>
                </div>`).join('');
            } catch (e) { /* ignore */ }
        }

        async function ackAlert(id) {
            await fetch(`${getApiBase()}/api/alert/events/${id}/ack`, { method: 'POST' });
            loadAlerts();
        }

        async function ackAllAlerts() {
            await fetch(`${getApiBase()}/api/alert/events/ack-all`, { method: 'POST' });
            loadAlerts();
        }

        // ========== Rule Config Modal ==========
        let ruleModalAgentId = null;
        let cachedPartitions = []; // 缓存当前 agent 的磁盘分区

        async function openRuleModal(agentId) {
            ruleModalAgentId = agentId;
            document.getElementById('ruleModalTitle').textContent = '告警规则 — ' + (agentId.length > 12 ? agentId.substring(0, 12) + '…' : agentId);
            document.getElementById('ruleModal').classList.add('show');
            document.getElementById('addRuleForm').style.display = 'none';
            // 缓存分区数据
            try {
                const resp = await fetch(`${getApiBase()}/api/dashboard/agents/${encodeURIComponent(agentId)}`);
                const r = await resp.json();
                cachedPartitions = (r.data && r.data.parts) ? r.data.parts.map(p => p.mountPoint) : [];
            } catch (e) { cachedPartitions = []; }
            loadRules(agentId);
        }

        function closeRuleModal() {
            document.getElementById('ruleModal').classList.remove('show');
            ruleModalAgentId = null;
        }

        async function loadRules(agentId) {
            const container = document.getElementById('ruleListContainer');
            container.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:11px;text-align:center;">加载中…</div>';
            try {
                const resp = await fetch(`${getApiBase()}/api/alert/rules/applicable?agentId=${encodeURIComponent(agentId)}`);
                const result = await resp.json();
                const rules = (result.code === 200 ? result.data : []) || [];
                if (rules.length === 0) {
                    container.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:11px;text-align:center;">暂无规则，点击下方添加</div>';
                    return;
                }
                const TL = { CPU_USAGE: 'CPU', RAM_USAGE: 'RAM', DISK_USAGE: '磁盘', DISK_PARTITION: '分区', PROCESS_ABNORMAL: '进程异常', AGENT_OFFLINE: '离线', LOG_HIT_CRITICAL: 'CRITICAL命中', LOG_HIT_TOTAL: '命中总数' };
                const OL = { GT: '>', GTE: '≥', LT: '<', LTE: '≤', EQ: '=' };
                const NN = ['PROCESS_ABNORMAL', 'AGENT_OFFLINE'];

                container.innerHTML = rules.map(r => {
                    const scope = r.agentId === '*' ? ' (全局)' : '';
                    let exprStr = '';
                    try {
                        const expr = JSON.parse(r.conditions || '{}');
                        const topLogic = expr.logic || 'OR';
                        const groups = expr.groups || [];
                        const groupStrs = groups.map(g => {
                            const gl = g.logic || 'OR';
                            const items = (g.items || []).map(c => {
                                const tl = TL[c.metricType] || c.metricType;
                                const tgt = c.targetName ? `[${escapeHtml(c.targetName)}]` : '';
                                const dur = c.durationSec > 0 ? `(持续≥${c.durationSec}s${c.durationSec < 60 ? '⚠️' : ''})` : '';
                                if (NN.includes(c.metricType)) return `${tl}${tgt}${dur}`;
                                const op = OL[c.operator] || c.operator;
                                const unit = (c.metricType || '').includes('USAGE') ? '%' : '';
                                return `${tl}${tgt}${op}${c.threshold}${unit}${dur}`;
                            });
                            const glLabel = gl === 'AND' ? ' 且 ' : ' 或 ';
                            return items.length > 1 ? `(${items.join(glLabel)})` : items[0] || '';
                        });
                        const tlLabel = topLogic === 'AND' ? ' 且 ' : ' 或 ';
                        exprStr = groupStrs.join(tlLabel);
                    } catch (e) { exprStr = '(解析失败)'; }
                    return `<div class="rule-item">
                        <span class="alert-level-tag ${r.alertLevel}" style="flex-shrink:0">${r.alertLevel}</span>
                        <div class="rule-info">
                            <div class="rule-name">${escapeHtml(r.ruleName)}${scope}</div>
                            <div class="rule-desc">${exprStr} · 冷却${r.cooldownSec}s${r.cooldownSec < 60 ? ' ⚠️' : ''} · ${r.enabled ? '✅' : '❌'}</div>
                        </div>
                        ${r.agentId !== '*' ? `<button class="btn-del" onclick="deleteRule(${r.id})" title="删除">🗑</button>` : ''}
                    </div>`;
                }).join('');
            } catch (e) {
                container.innerHTML = `<div style="padding:10px;color:var(--red);font-size:11px;">加载失败: ${e.message}</div>`;
            }
        }

        // ========== 分组条件管理 ==========
        const METRIC_OPTIONS = [
            { value: 'CPU_USAGE', label: 'CPU 使用率', numeric: true },
            { value: 'RAM_USAGE', label: '内存使用率', numeric: true },
            { value: 'DISK_USAGE', label: '总磁盘使用率', numeric: true },
            { value: 'DISK_PARTITION', label: '磁盘分区(可用MB)', numeric: true },
            { value: 'PROCESS_ABNORMAL', label: '进程异常', numeric: false },
            { value: 'AGENT_OFFLINE', label: 'Agent离线', numeric: false },
            { value: 'LOG_HIT_CRITICAL', label: 'CRITICAL命中数', numeric: true },
            { value: 'LOG_HIT_TOTAL', label: '日志命中总数', numeric: true }
        ];
        const OP_OPTIONS = [
            { value: 'GT', label: '> 大于' }, { value: 'GTE', label: '≥ 大于等于' },
            { value: 'LT', label: '< 小于' }, { value: 'LTE', label: '≤ 小于等于' },
            { value: 'EQ', label: '= 等于' }
        ];
        let topLogic = 'AND';
        let groupCounter = 0;

        function showAddRuleForm() {
            document.getElementById('addRuleForm').style.display = 'block';
            document.getElementById('newRuleName').value = '';
            document.getElementById('newCooldown').value = '60';
            document.getElementById('groupsContainer').innerHTML = '';
            topLogic = 'AND';
            groupCounter = 0;
            updateTopLogicBtn();
            addGroup(); // 默认一个分组
        }

        function toggleTopLogic() {
            topLogic = topLogic === 'AND' ? 'OR' : 'AND';
            updateTopLogicBtn();
        }

        function updateTopLogicBtn() {
            const btn = document.getElementById('topLogicToggle');
            btn.textContent = topLogic === 'AND' ? '组间: 且 AND' : '组间: 或 OR';
            btn.style.background = topLogic === 'AND' ? 'rgba(108,92,231,0.2)' : 'var(--surface2)';
            btn.style.borderColor = topLogic === 'AND' ? 'var(--accent)' : 'var(--border)';
            document.querySelectorAll('.group-divider').forEach(d => {
                d.textContent = topLogic === 'AND' ? '且 AND' : '或 OR';
            });
        }

        function addGroup() {
            const container = document.getElementById('groupsContainer');
            const gIdx = groupCounter++;
            // 组间分隔
            if (container.children.length > 0) {
                const divider = document.createElement('div');
                divider.className = 'group-divider';

            btn.style.background = cur === 'AND' ? 'rgba(0,206,209,0.15)' : 'var(--surface)';
            // 同步更新组内分隔线
            const group = btn.closest('.cond-group');
            group.querySelectorAll('.item-divider').forEach(d => {
                d.textContent = cur === 'AND' ? '且 AND' : '或 OR';
            });
        }

        function removeGroup(btn) {
            const group = btn.closest('.cond-group');
            const prev = group.previousElementSibling;
            const next = group.nextElementSibling;
            if (prev && prev.classList.contains('group-divider')) prev.remove();
            if (next && next.classList.contains('group-divider')) next.remove();
            group.remove();
            const container = document.getElementById('groupsContainer');
            if (container.firstElementChild && container.firstElementChild.classList.contains('group-divider')) {

        function onCondMetricChange(select) {
            const row = select.closest('.cond-row');
            const metric = select.value;
            const mo = METRIC_OPTIONS.find(m => m.value === metric);
            const isNumeric = mo ? mo.numeric : true;
            const needsTarget = (metric === 'DISK_PARTITION' || metric === 'PROCESS_ABNORMAL');
            const isLogHit = (metric === 'LOG_HIT_CRITICAL' || metric === 'LOG_HIT_TOTAL');

            // 操作符/阈值：非数值类型隐藏
            const opEl = row.querySelector('.cond-op');
            const thEl = row.querySelector('.cond-threshold');
            opEl.style.display = isNumeric ? '' : 'none';
            thEl.style.display = isNumeric ? '' : 'none';
            opEl.disabled = !isNumeric;
            thEl.disabled = !isNumeric;

            // 持续时间：日志命中类型用作"时间窗口"，其他类型用作"持续时间"
            const durEl = row.querySelector('.cond-duration');
            if (isLogHit) {
                durEl.placeholder = '窗口(秒)';
                durEl.title = '统计时间窗口(秒)，在此窗口内累计命中数。\n默认300秒(5分钟)。';
                durEl.value = durEl.value === '0' ? '300' : durEl.value;
            } else {
                durEl.placeholder = '持续(秒)≥60';
                durEl.title = '持续时间(秒)，0=瞬时判定。\n注意：检测间隔取决于Agent上报频率(约60s)，\n小于60s的值实际精度等于上报间隔。';
            }

            // 目标字段：仅 DISK_PARTITION / PROCESS_ABNORMAL 显示
            const oldTarget = row.querySelector('.cond-target');
            if (needsTarget) {
                if (metric === 'DISK_PARTITION' && cachedPartitions.length > 0) {
                    const sel = document.createElement('select');
                    sel.className = 'cond-target';
                    sel.style.cssText = 'display:inline-block;width:70px;padding:3px 5px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;';
                    sel.innerHTML = cachedPartitions.map(p => `<option value="${p}">${p}:</option>`).join('');
                    oldTarget.replaceWith(sel);
                } else {
                    if (oldTarget.tagName === 'SELECT') {
                        const inp = document.createElement('input');
                        inp.className = 'cond-target';
                        inp.placeholder = metric === 'PROCESS_ABNORMAL' ? '进程名' : '目标';
                        inp.style.cssText = 'display:inline-block;width:70px;padding:3px 5px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:11px;';
                        oldTarget.replaceWith(inp);
                    } else {
                        oldTarget.style.display = 'inline-block';
                        oldTarget.placeholder = metric === 'PROCESS_ABNORMAL' ? '进程名(可选)' : '目标';
                    }
                }
            } else {
                oldTarget.style.display = 'none';
                oldTarget.value = '';
            }
        }

        async function submitNewRule() {
            const groupEls = document.querySelectorAll('#groupsContainer .cond-group');
            if (groupEls.length === 0) { alert('请至少添加一个条件组'); return; }

            const groups = Array.from(groupEls).map(gEl => {
                const logicBtn = gEl.querySelector('.grp-logic-btn');
                const groupLogic = logicBtn.textContent.includes('AND') ? 'AND' : 'OR';
                const items = Array.from(gEl.querySelectorAll('.cond-row')).map(row => ({
                    metricType: row.querySelector('.cond-metric').value,
                    operator: row.querySelector('.cond-op').value,
                    threshold: parseFloat(row.querySelector('.cond-threshold').value) || 0,
                    targetName: row.querySelector('.cond-target').value || null,
                    durationSec: parseInt(row.querySelector('.cond-duration').value) || 0
                }));
                return { logic: groupLogic, items };
            }).filter(g => g.items.length > 0);

            if (groups.length === 0) { alert('条件组内需要至少一个条件'); return; }

            // 智能提醒：检测粒度警告
            const REPORT_INTERVAL = 60;
            const cooldownVal = parseInt(document.getElementById('newCooldown').value) || 300;
            const smallDurations = [];
            groups.forEach(g => g.items.forEach(c => {
                if (c.durationSec > 0 && c.durationSec < REPORT_INTERVAL) smallDurations.push(c.durationSec);
            }));
            if (cooldownVal > 0 && cooldownVal < REPORT_INTERVAL) {
                if (!confirm(`冷却时间 ${cooldownVal}s 小于 Agent 上报间隔(${REPORT_INTERVAL}s)，实际冷却效果约等于上报间隔。\n是否继续？`)) return;
            }
            if (smallDurations.length > 0) {
                if (!confirm(`持续时间 ${[...new Set(smallDurations)].join('s, ')}s 小于 Agent 上报间隔(${REPORT_INTERVAL}s)，实际精度受上报间隔约束。\n是否继续？`)) return;
            }

            const expression = { logic: topLogic, groups };
            const rule = {
                agentId: ruleModalAgentId,
                ruleName: document.getElementById('newRuleName').value || '未命名规则',
                conditions: JSON.stringify(expression),
                alertLevel: document.getElementById('newAlertLevel').value,
                cooldownSec: parseInt(document.getElementById('newCooldown').value) || 300,
                enabled: true
            };

            try {
                await fetch(`${getApiBase()}/api/alert/rules`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(rule)
                });
                document.getElementById('addRuleForm').style.display = 'none';
                loadRules(ruleModalAgentId);
            } catch (e) { alert('创建失败: ' + e.message); }
        }

        async function loadLogMonitors(agentId) {

            container.innerHTML = '<div style="padding:10px;color:var(--text2);font-size:11px;text-align:center;">加载中…</div>';
            
            const cmd = {

            try {
                const resp = await fetch(`${getApiBase()}/api/commands/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                if (result.code !== 200 || !result.data) {

                if (cmdResp.status !== 'SUCCESS') {

                const monitors = agentResp.monitors || [];
                if (monitors.length === 0) {

        async function parseAgentCommandResult(resp) {
            const result = await resp.json();
            if (result.code !== 200 || !result.data) {
                throw new Error(result.message || '请求失败');
            }

            const cmdResp = result.data;
            if (cmdResp.status !== 'SUCCESS') {
                throw new Error('Agent 响应错误: ' + cmdResp.status);
            }

            let agentResp;
            try {
                agentResp = JSON.parse(cmdResp.response);
            } catch (_) {
                throw new Error('Agent 响应不是有效 JSON');
            }

            if (!agentResp.success) {
                throw new Error(agentResp.message || '操作失败');
            }

            return agentResp;

                    body: JSON.stringify({ agentId, content: JSON.stringify(cmd) })
                });
                const agentResp = await parseAgentCommandResult(resp);
                const services = agentResp.services || [];

                if (services.length === 0) {
                    container.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:11px;text-align:center;">当前没有运行中的 TTYD 服务。</div>';
                    return;
                }

                container.innerHTML = services.map(s => {
                    const statusClass = s.isRunning ? 'ftag-exclude' : 'ftag-critical';
                    const statusText = s.isRunning ? '运行中' : '已停止';
                    const ttydUrl = resolveTtydUrl(s);
                    return `<div class="rule-item">
                        <span class="ftag ${statusClass}" style="flex-shrink:0">${statusText}</span>
                        <div class="rule-info">
                            <div class="rule-name">Port ${escapeHtml(String(s.port || '-'))} <span style="font-size:10px;color:var(--text2);font-weight:normal;">${escapeHtml(s.command || 'bash')}</span></div>
                            <div class="rule-desc"><code style="font-size:10px;color:var(--cyan);">${escapeHtml(ttydUrl || 'http://localhost')}</code></div>
                            <div class="rule-desc">Writable: ${s.writable ? 'true' : 'false'} | Workdir: ${escapeHtml(s.workingDirectory || '/')}</div>
                        </div>
                        <div class="rule-actions">
                            ${ttydUrl ? `<a class="btn-open" href="${escapeAttr(ttydUrl)}" target="_blank" rel="noopener noreferrer">打开</a>` : ''}
                            <button class="btn-action danger" onclick="stopTtydService(${Number(s.port)})">停止</button>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                container.innerHTML = `<div style="padding:10px;color:var(--red);font-size:11px;">加载失败: ${escapeHtml(e.message)}</div>`;
            }
        }

        function showAddTtydForm(shouldShow = true) {
            const form = document.getElementById('addTtydForm');
            form.style.display = shouldShow ? 'block' : 'none';
            if (!shouldShow) return;
            document.getElementById('ttydPort').value = '7681';
            document.getElementById('ttydUsername').value = 'admin';
            document.getElementById('ttydPassword').value = 'password';
            document.getElementById('ttydWritable').checked = true;
        }

        async function submitNewTtydService() {
            const portVal = document.getElementById('ttydPort').value.trim();
            const username = document.getElementById('ttydUsername').value.trim();
            const password = document.getElementById('ttydPassword').value;
            const writable = document.getElementById('ttydWritable').checked;
            const port = Number(portVal);
            if (!Number.isInteger(port) || port < 1 || port > 65535) {
                alert('端口必须是 1-65535 之间的整数');
                return;
            }
            if (!username) {
                alert('账号不能为空');
                return;
            }
            if (!password) {
                alert('密码不能为空');
                return;
            }
            const credential = `${username}:${password}`;

            setTtydMessage('', '');
            const btn = document.getElementById('btnStartTtyd');
            const prevHtml = btn.innerHTML;
            let popup = null;

            try {
                popup = window.open('about:blank', '_blank');
                if (popup && popup.document) {
                    popup.document.title = '正在打开 TTYD...';
                    popup.document.body.innerHTML = '<div style="font-family:Segoe UI,sans-serif;padding:24px;color:#303133;">TTYD 启动中，正在打开终端...</div>';
                }
            } catch (_) {
                popup = null;
            }

            btn.disabled = true;
            btn.innerHTML = '启动中...';

            const cmd = {
                type: "cmd",
                cmd: {
                    func: "TtydService/start",
                    param: [JSON.stringify({ Port: port, Credential: credential, Writable: writable })],
                    cmdID: "ttyd-start-" + Date.now()
                }
            };

            try {
                const resp = await fetch(`${getApiBase()}/api/commands/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agentId: ttydModalAgentId, content: JSON.stringify(cmd) })
                });
                const agentResp = await parseAgentCommandResult(resp);
                const ttydUrl = resolveTtydUrl(agentResp);

                if (!ttydUrl) {
                    throw new Error('TTYD 已启动，但未返回可访问地址');
                }

                if (popup) {
                    popup.location.href = ttydUrl;
                } else {
                    setTtydMessage('success', `TTYD 已启动。${escapeHtml(agentResp.message || '')}<br><a href="${escapeAttr(ttydUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(ttydUrl)}</a><br>浏览器可能拦截了新窗口，请点击上方链接手动打开。`);
                }

                if (popup && popup.document) {
                    setTtydMessage('success', `TTYD 已启动。${escapeHtml(agentResp.message || '')}<br><a href="${escapeAttr(ttydUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(ttydUrl)}</a>`);
                }

                document.getElementById('addTtydForm').style.display = 'none';
                await loadTtydServices(ttydModalAgentId);
            } catch (e) {
                if (popup && !popup.closed) {
                    popup.close();
                }
                setTtydMessage('error', `启动失败: ${escapeHtml(e.message)}`);
                alert('启动 TTYD 失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = prevHtml;
            }
        }

        async function stopTtydService(port) {
            if (!confirm('确定停止该 TTYD 服务？\n端口: ' + port)) return;

            const cmd = {
                type: "cmd",
                cmd: {
                    func: "TtydService/stopByPort",
                    param: [port],
                    cmdID: "ttyd-stop-" + Date.now()
                }
            };

            try {
                const resp = await fetch(`${getApiBase()}/api/commands/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agentId: ttydModalAgentId, content: JSON.stringify(cmd) })
                });
                const agentResp = await parseAgentCommandResult(resp);
                setTtydMessage('success', `已停止端口 ${escapeHtml(String(port))}<br>${escapeHtml(agentResp.message || '')}`);
                await loadTtydServices(ttydModalAgentId);
            } catch (e) {
                setTtydMessage('error', `停止失败: ${escapeHtml(e.message)}`);
                alert('停止 TTYD 失败: ' + e.message);
            }
        }

        // ========== Init ==========
        (function () {
            const h = document.getElementById('apiHost');
            h.value = location.protocol === 'file:' ? 'localhost:8080' : (location.host || 'localhost:8080');
            loadDashboard();
            loadAlerts();
            startCountdown();
            const origLoad = loadDashboard;
            loadDashboard = async function () { await origLoad(); loadAlerts(); };
        })();
    </script>

    <!-- Rule Configuration Modal -->
    <div class="modal-overlay" id="ruleModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="ruleModalTitle">告警规则</h2>
                <button class="btn-close" onclick="closeRuleModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="rule-list" id="ruleListContainer"></div>
                <button class="btn-add-rule" onclick="showAddRuleForm()">+ 添加新规则</button>
                <div class="add-rule-form" id="addRuleForm" style="display:none;">
                    <div style="background:rgba(116,185,255,0.1);border:1px solid rgba(116,185,255,0.3);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--blue);display:flex;align-items:center;gap:6px;">
                        <span style="font-size:16px;">⏱</span>
                        <span>检测间隔说明：告警检测频率取决于 Agent 上报间隔（当前约 60 秒）。持续时间和冷却时间的实际精度受此间隔约束。</span>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>规则名称</label><input id="newRuleName" placeholder="如: 综合告警"></div>
                        <div class="form-group"><label>告警级别</label>
                            <select id="newAlertLevel">
                                <option value="WARNING">⚠️ WARNING</option>
                                <option value="CRITICAL">🔴 CRITICAL</option>
                            </select>
                        </div>
                        <div class="form-group"><label>冷却(秒) — 建议 ≥ 60</label><input id="newCooldown" type="number" value="60" min="1">
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                        <span style="font-size:11px;color:var(--text2);font-weight:600;">条件分组</span>
                        <button id="topLogicToggle" onclick="toggleTopLogic()"
                            style="font-size:9px;padding:2px 10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:4px;cursor:pointer;">组间:
                            且 AND</button>
                        <span style="flex:1"></span>
                        <button onclick="addGroup()"
                            style="font-size:10px;padding:2px 10px;border:1px dashed var(--border);background:none;color:var(--cyan);border-radius:4px;cursor:pointer;">+
                            添加组</button>
                    </div>
                    <div id="groupsContainer" style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;">
                    </div>
                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                        <button class="btn-secondary"
                            onclick="document.getElementById('addRuleForm').style.display='none'">取消</button>
                        <button class="btn-primary" onclick="submitNewRule()">创建规则</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Rule Configuration Modal -->
    <div class="modal-overlay" id="filterRuleModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="filterRuleModalTitle">日志过滤规则</h2>
                <button class="btn-close" onclick="closeFilterRuleModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="rule-list" id="filterRuleListContainer"></div>
                <button class="btn-add-rule" onclick="showAddFilterRuleForm()">+ 添加过滤规则</button>
                <div class="add-rule-form" id="addFilterRuleForm" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>规则类型</label>
                            <select id="frRuleType">
                                <option value="CRITICAL">🔴 CRITICAL 强关注</option>
                                <option value="EXCLUDE">✅ EXCLUDE 排除</option>
                                <option value="BASIC">🟡 BASIC 基础特征</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>匹配模式</label>
                            <select id="frMatchMode">
                                <option value="CONTAINS">CONTAINS 包含</option>
                                <option value="REGEX">REGEX 正则</option>
                                <option value="STARTS_WITH">STARTS_WITH</option>
                                <option value="ENDS_WITH">ENDS_WITH</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>规则名称</label><input id="frRuleName" placeholder="如: 数据库超时"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>匹配关键字</label><input id="frKeyword" placeholder="如: 调用第三方接口超时"></div>
                    </div>
                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                        <button class="btn-secondary" onclick="document.getElementById('addFilterRuleForm').style.display='none'">取消</button>
                        <button class="btn-primary" onclick="submitNewFilterRule()">创建规则</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Monitor Modal -->
    <div class="modal-overlay" id="logMonitorModal">
        <div class="modal" style="width: 700px;">
            <div class="modal-header">
                <h2 id="logMonitorModalTitle">日志监听管理</h2>
                <button class="btn-close" onclick="closeLogMonitorModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="rule-list" id="logMonitorListContainer"></div>
                <button class="btn-add-rule" onclick="showAddLogMonitorForm()">+ 添加日志监听</button>
                <div class="add-rule-form" id="addLogMonitorForm" style="display:none;">
                    <div class="form-row">
                        <div class="form-group"><label>应用名称</label><input id="lmAppName" placeholder="如: 受理系统" autocomplete="off"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>监听路径 (支持通配符)</label><input id="lmPath" placeholder="如: D:\logs\*.log 或 /opt/logs/*.log" style="font-family: monospace;" autocomplete="off"></div>
                    </div>
                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                        <button class="btn-secondary" onclick="document.getElementById('addLogMonitorForm').style.display='none'">取消</button>
                        <button class="btn-primary" onclick="submitNewLogMonitor()">添加监听</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- TTYD Modal -->
    <div class="modal-overlay" id="ttydModal">
        <div class="modal" style="width: 760px;">
            <div class="modal-header">
                <h2 id="ttydModalTitle">TTYD 管理</h2>
                <button class="btn-close" onclick="closeTtydModal()">✕</button>
            </div>
            <div class="modal-body">
                <div id="ttydActionMessage" class="notice-card" style="display:none;"></div>
                <div class="rule-list" id="ttydListContainer"></div>
                <button class="btn-add-rule" onclick="showAddTtydForm()">+ 启动 TTYD</button>
                <div class="add-rule-form" id="addTtydForm" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Port</label>
                            <input id="ttydPort" type="number" min="1" max="65535" value="7681" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>Writable</label>
                            <label class="inline-check"><input id="ttydWritable" type="checkbox" checked> 允许终端写入</label>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>账号</label>
                            <input id="ttydUsername" value="admin" placeholder="请输入账号" style="font-family: monospace;" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input id="ttydPassword" type="password" value="password" placeholder="请输入密码" style="font-family: monospace;" autocomplete="off">
                        </div>
                    </div>
                    <div style="font-size:11px;color:var(--text2);margin-top:-2px;margin-bottom:8px;">启动成功后会立即打开 TTYD 地址，认证由浏览器和 TTYD Basic Auth 处理。</div>
                    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
                        <button class="btn-secondary" onclick="showAddTtydForm(false)">取消</button>
                        <button class="btn-primary" id="btnStartTtyd" onclick="submitNewTtydService()">启动并打开</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
