# Application Settings
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# WebSocket Settings
ws.agent.token=default-pre-shared-key
ws.heartbeat.timeout-seconds=90

# H2 In-Memory Database (for development/testing)
#spring.datasource.url=jdbc:h2:mem:monitor_db;DB_CLOSE_DELAY=-1;MODE=MySQL
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# MySQL Database
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/dv_db_monitor?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis-Plus auto-create tables from SQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/init.sql
spring.sql.init.encoding=UTF-8

# Data Retention (days) — 定时清理过期数据
cleanup.retention.metrics-days=7
cleanup.retention.loghit-days=30
cleanup.retention.alert-days=90
cleanup.cron=0 0 * * * ?
