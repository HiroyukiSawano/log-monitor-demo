# Application Settings
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# WebSocket Settings
ws.agent.token=default-pre-shared-key
ws.heartbeat.timeout-seconds=90

# H2 In-Memory Database (for development/testing)
spring.datasource.url=jdbc:h2:mem:monitor_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis-Plus auto-create tables from SQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/init.sql
spring.sql.init.encoding=UTF-8
